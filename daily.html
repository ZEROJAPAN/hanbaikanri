<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日報入力</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Meiryo','MS Gothic','Yu Gothic',sans-serif;font-size:11px;background:#90ee90;}
.wrap{padding:4px;}
.nav-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px;align-items:center;}
.nbtn{padding:2px 8px;font-size:11px;font-weight:bold;border:1px solid #555;border-radius:2px;cursor:pointer;background:#ffff99;color:#000;white-space:nowrap;}
.nbtn.active{background:#ffff00;}
.nbtn.master{background:#ff8888;}
.nbtn.side{background:#ddd;width:100%;padding:4px 6px;}
.nbtn.logout{background:#fff;}
.store-sel{font-size:11px;padding:1px 3px;border:1px solid #888;}
.date-input{font-size:11px;padding:1px 3px;border:1px solid #888;border-radius:2px;}
.main-area{display:flex;gap:6px;align-items:flex-start;}

/* 横スクロール */
.tbl-outer{
  flex:1;overflow-x:auto;overflow-y:visible;
  scrollbar-width:auto;scrollbar-color:#888 #ddd;
  padding-bottom:12px;
}
.tbl-outer::-webkit-scrollbar{height:16px;}
.tbl-outer::-webkit-scrollbar-track{background:#ddd;border-radius:4px;}
.tbl-outer::-webkit-scrollbar-thumb{background:#888;border-radius:4px;}
.tbl-outer::-webkit-scrollbar-thumb:hover{background:#444;}

/* テーブル本体 */
/* 商品名130 + 21列×(件数40+金額120) = 130 + 21×160 = 3490px */
table{border-collapse:collapse;table-layout:fixed;width:2900px;}

/* 商品名列（固定） */
.cat-td{
  border:1.5px solid #c08080;padding:2px 5px;
  background:#d0f0f8;font-size:10px;white-space:nowrap;
  width:130px;position:sticky;left:0;z-index:2;
}
th.name-th{
  width:130px;position:sticky;left:0;z-index:3;
  background:#f4a0a0;border:1.5px solid #c08080;
}

/* 件数セル：黄色・40px */
.td-qty{width:50px;border:2px solid #cc8800;padding:1px;background:#ffff00;}
.td-qty input{
  width:50px;border:none;background:#ffff88;
  font-size:10px;text-align:right;padding:1px 2px;outline:none;font-weight:bold;
}

/* 金額セル：白・120px */
.td-amt{width:80px;border:2px solid #8888bb;padding:1px;background:#ffffff;}
.td-amt input{
  width:80px;border:none;background:#ffffff;
  font-size:10px;text-align:right;padding:1px 3px;outline:none;
}

/* ヘッダー */
th{border:1.5px solid #c08080;padding:2px 3px;text-align:center;background:#f4a0a0;font-size:10px;white-space:nowrap;}
th.buy-hdr{background:#ffcccc;}
th.qty-hdr{width:50px;background:#ffff00;font-size:9px;font-weight:bold;border:1.5px solid #cc8800;}
th.amt-hdr{width:80px;background:#ffffff;font-size:9px;border:1.5px solid #8888bb;}

/* 集計行 */
.sum-label{border:1.5px solid #c08080;padding:2px 4px;text-align:center;font-size:10px;font-weight:bold;background:#ffff88;position:sticky;left:0;z-index:2;width:130px;}
.sum-qty{width:50px;border:2px solid #cc8800;padding:2px 2px;text-align:right;font-size:10px;font-weight:bold;background:#ffff88;}
.sum-amt{width:80px;border:2px solid #8888bb;padding:2px 3px;text-align:right;font-size:10px;font-weight:bold;background:#ffffff;}
.gray-qty{width:50px;border:1px solid #aaa;background:#c0c0c0;}
.gray-amt{width:80px;border:1px solid #aaa;background:#c0c0c0;}

.right-btns{display:flex;flex-direction:column;gap:5px;min-width:95px;}
.bottom-area{display:flex;align-items:center;gap:12px;margin-top:8px;}
.visitor-box{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.visitor-lbl{background:#ff4444;color:#fff;font-weight:bold;padding:2px 8px;font-size:11px;border-radius:2px;}
.visitor-inp{width:80px;text-align:right;font-size:12px;border:1px solid #888;padding:2px 3px;}
.reg-btn{padding:6px 24px;font-size:13px;font-weight:bold;background:#4488ff;color:#fff;border:none;border-radius:3px;cursor:pointer;}
.reg-btn.done{background:#44aa44;}
.clear-btn{padding:6px 14px;font-size:11px;background:#ffaaaa;border:1px solid #cc4444;border-radius:3px;cursor:pointer;}
.status-bar{margin-top:6px;padding:3px 8px;background:rgba(0,0,0,0.18);border-radius:3px;font-size:10px;color:#fff;display:flex;gap:16px;flex-wrap:wrap;}
</style>
</head>

        <col style="width:50px;"><col style="width:80px;">

<script>
const CATS=[
  {id:1, name:'1.金'},
  {id:2, name:'2.プラチナ'},
  {id:3, name:'3.コンビ'},
  {id:4, name:'4.ジュエリー'},
  {id:5, name:'5.時計'},
  {id:6, name:'6.ブランド品'},
  {id:7, name:'7.テレカ・金券類（非課税）'},
  {id:8, name:'8.お酒'},
  {id:9, name:'9.その他'},
  {id:10,name:'10.切手・印紙'},
  {id:11,name:'サービス券値引き'},
  {id:12,name:'返品・ジュエリー'},
];
const COLS=[
  'buy','cancel','shop','free','honten',
  'raku','rakuEx','yahoo','yahuoku','wowma',
  'merukari','ebay','lux','amazon','subscr',
  'rakuma','qoo10','globa','auction','web','other'
];
const SALE_KEYS=COLS.filter(k=>k!=='buy'&&k!=='cancel');

const data={};
CATS.forEach(c=>{
  data[c.id]={};
  COLS.forEach(k=>{data[c.id][k]={q:'',a:''};});
});

function fmt(n){return(n||0).toLocaleString('ja-JP');}
function num(v){const n=parseInt((v||'').replace(/[^0-9\-]/g,''),10);return isNaN(n)?0:n;}
function colSum(k,f){return CATS.reduce((s,c)=>s+num(data[c.id][k][f]),0);}

function updateCell(cid,k,f,v){
  data[cid][k][f]=v.replace(/[^0-9\-]/g,'');
  recalc();
}

function recalc(){
  COLS.forEach(k=>{
    const sq=document.getElementById('sq_'+k);
    const sa=document.getElementById('sa_'+k);
    if(sq)sq.textContent=fmt(colSum(k,'q'));
    if(sa)sa.textContent=fmt(colSum(k,'a'));
  });
  const pure=SALE_KEYS.reduce((s,k)=>s+colSum(k,'a'),0);
  SALE_KEYS.forEach(k=>{
    const el=document.getElementById('pu_'+k);
    if(el)el.textContent=fmt(colSum(k,'a'));
  });
  const tax=Math.floor(colSum('shop','a')*10/110);
  const taxH=Math.floor(colSum('honten','a')*10/110);
  const et=document.getElementById('tax_shop');if(et)et.textContent=fmt(tax);
  const eth=document.getElementById('tax_hon');if(eth)eth.textContent=fmt(taxH);
  const eg=document.getElementById('genk');if(eg)eg.textContent=fmt(colSum('shop','a'));
  document.getElementById('st-sales').textContent='純売上合計：¥'+fmt(pure);
  document.getElementById('st-tax').textContent='消費税：¥'+fmt(tax);
}

function buildTable(){
  const tbody=document.getElementById('tbl-body');
  let h='';

  // データ行
  CATS.forEach(c=>{
    h+=`<tr><td class="cat-td">${c.name}</td>`;
    COLS.forEach(k=>{
      h+=`<td class="td-qty"><input type="text" inputmode="numeric" id="c${c.id}_${k}_q" oninput="updateCell(${c.id},'${k}','q',this.value)"></td>`;
      h+=`<td class="td-amt"><input type="text" inputmode="numeric" id="c${c.id}_${k}_a" oninput="updateCell(${c.id},'${k}','a',this.value)"></td>`;
    });
    h+=`</tr>`;
  });

  // 計行
  h+=`<tr><td class="sum-label">計</td>`;
  COLS.forEach(k=>{
    h+=`<td class="sum-qty" id="sq_${k}">0</td><td class="sum-amt" id="sa_${k}">0</td>`;
  });
  h+=`</tr>`;

  // 純売上行
  h+=`<tr><td class="sum-label">純売上</td>`;
  COLS.forEach(k=>{
    if(k==='buy'||k==='cancel'){
      h+=`<td class="gray-qty"></td><td class="gray-amt"></td>`;
    } else {
      h+=`<td class="gray-qty"></td><td class="sum-amt" id="pu_${k}">0</td>`;
    }
  });
  h+=`</tr>`;

  // 消費税行
  h+=`<tr><td class="sum-label">消費税</td>`;
  COLS.forEach(k=>{
    if(k==='shop'){
      h+=`<td class="gray-qty"></td><td class="sum-amt" id="tax_shop">0</td>`;
    } else if(k==='honten'){
      h+=`<td class="gray-qty"></td><td class="sum-amt" id="tax_hon">0</td>`;
    } else {
      h+=`<td class="gray-qty"></td><td class="gray-amt"></td>`;
    }
  });
  h+=`</tr>`;

  // 現計行
  h+=`<tr><td class="sum-label">現計</td>`;
  COLS.forEach(k=>{
    if(k==='shop'){
      h+=`<td class="gray-qty"></td><td class="sum-amt" id="genk">0</td>`;
    } else {
      h+=`<td class="gray-qty"></td><td class="gray-amt"></td>`;
    }
  });
  h+=`</tr>`;

  // 掛計行
  h+=`<tr><td class="sum-label">掛計</td>`;
  COLS.forEach(k=>{
    if(k==='shop'){
      h+=`<td class="gray-qty"></td><td class="sum-amt">0</td>`;
    } else {
      h+=`<td class="gray-qty"></td><td class="gray-amt"></td>`;
    }
  });
  h+=`</tr>`;

  // 客数行
  h+=`<tr><td class="sum-label">客数</td>`;
  COLS.forEach(()=>{
    h+=`<td class="gray-qty"></td><td class="td-amt"><input type="text" inputmode="numeric" value="0" style="width:80px;border:none;background:#fff;font-size:10px;text-align:right;padding:1px 3px;outline:none;"></td>`;
  });
  h+=`</tr>`;

  tbody.innerHTML=h;
}

function handleSave(){
  const btn=document.getElementById('reg-btn');
  btn.textContent='登録済み ✓';btn.classList.add('done');
  setTimeout(()=>{btn.textContent='登録';btn.classList.remove('done');},2500);
}
function handleClear(){
  if(!confirm('入力内容をクリアしますか？'))return;
  CATS.forEach(c=>{COLS.forEach(k=>{
    data[c.id][k]={q:'',a:''};
    const eq=document.getElementById('c'+c.id+'_'+k+'_q');
    const ea=document.getElementById('c'+c.id+'_'+k+'_a');
    if(eq)eq.value='';if(ea)ea.value='';
  });});
  recalc();
}
function handleLogout(){
  if(confirm('ログアウトしますか？')){localStorage.clear();window.location.href='login.html';}
}

// 初期化
const savedStore=localStorage.getItem('store')||'';
const savedUser=localStorage.getItem('userid')||'';
if(savedStore){
  const sel=document.getElementById('store');
  for(let i=0;i<sel.options.length;i++){
    if(sel.options[i].text===savedStore){sel.selectedIndex=i;break;}
  }
  document.getElementById('st-store').textContent='店舗：'+savedStore;
}
document.getElementById('st-user').textContent='ユーザー：'+savedUser;
const t=new Date();
const ds=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
document.getElementById('rdate').value=ds;
document.getElementById('st-date').textContent='日付：'+ds;
document.getElementById('rdate').addEventListener('change',function(){
  document.getElementById('st-date').textContent='日付：'+this.value;
});
document.getElementById('store').addEventListener('change',function(){
  document.getElementById('st-store').textContent='店舗：'+this.value;
  localStorage.setItem('store',this.value);
});

buildTable();
recalc();
</script>
</body>
</html>
