<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Meiryo','MS Gothic','Yu Gothic',sans-serif;font-size:11px;background:#90ee90;}
.wrap{padding:6px;}
/* トップバー */
.topbar{
display:flex;align-items:center;justify-content:space-between;
background:#1E2761;border-radius:8px;
padding:8px 14px;margin-bottom:8px;
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-size:14px;font-weight:bold;color:#fff;}
.back-btn{
padding:5px 14px;background:#fff;color:#1E2761;
border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;
}
.back-btn:hover{background:#EEF2FF;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.store-sel{font-size:11px;padding:4px 8px;border:1px solid #9FE1CB;border-radius:4px;background:#fff;}
.date-input{font-size:11px;padding:4px 8px;border:1px solid #9FE1CB;border-radius:4px;background:#fff;color:#1E2761;font-weight:bold;}
.logout-btn{padding:5px 12px;background:#fff;color:#1E2761;border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;}
.logout-btn:hover{background:#EEF2FF;}
.user-info{font-size:10px;color:#9FE1CB;}
/* メインエリア */
.main-area{display:flex;gap:8px;align-items:flex-start;}
/* テーブルラッパー */
.tbl-outer{
flex:1;
background:#fff;border-radius:8px;padding:0 10px 10px 10px;
overflow:scroll;
max-height:calc(100vh - 200px);
scrollbar-width:auto;scrollbar-color:#888 #ddd;
-webkit-overflow-scrolling:touch;
}
.tbl-outer::-webkit-scrollbar{height:14px;width:14px;}
.tbl-outer::-webkit-scrollbar-track{background:#ddd;border-radius:4px;}
.tbl-outer::-webkit-scrollbar-thumb{background:#888;border-radius:4px;}
table{border-collapse:collapse;table-layout:fixed;width:3500px;}
th.name-th{width:130px;position:sticky;left:0;top:0;z-index:4;background:#1E2761;color:#fff;border:1.5px solid #1E2761;}
.td-qty{width:50px;border:2px solid #cc8800;padding:1px;background:#ffff00;}
.td-qty input{width:50px;border:none;background:#ffff88;font-size:10px;text-align:right;padding:1px 2px;outline:none;font-weight:bold;}
.td-amt{width:80px;border:2px solid #8888bb;padding:1px;background:#ffffff;}
.td-amt input{width:80px;border:none;background:#ffffff;font-size:10px;text-align:right;padding:1px 3px;outline:none;}
th{border:1.5px solid #2D4FBA;padding:2px 3px;text-align:center;background:#1E2761;color:#fff;font-size:10px;white-space:nowrap;position:sticky;top:0;z-index:1;}
.sum-qty{width:50px;border:2px solid #cc8800;padding:2px 2px;text-align:right;font-size:10px;font-weight:bold;background:#ffff88;}
.sum-amt{width:80px;border:2px solid #4455aa;padding:2px 3px;text-align:right;font-size:10px;font-weight:bold;background:#EEF2FF;}
.gray-qty{width:50px;border:1px solid #aaa;background:#c0c0c0;}
.gray-amt{width:80px;border:1px solid #aaa;background:#c0c0c0;}
.input-amt{width:80px;border:2px solid #8888bb;padding:1px;background:#ffffff;}
.input-amt input{width:80px;border:none;background:#ffffff;font-size:10px;text-align:right;padding:1px 3px;outline:none;}
/* 右サイドボタン */
.right-btns{
display:flex;flex-direction:column;gap:6px;
min-width:110px;
background:#fff;border-radius:8px;padding:0 10px 10px 10px;
}
.right-btns-title{
font-size:10px;font-weight:bold;color:#64748B;
margin-bottom:4px;padding-bottom:4px;
border-bottom:1px solid #E2E8F0;
}
.side-btn{
padding:8px 6px;font-size:11px;font-weight:bold;
border:none;border-radius:6px;cursor:pointer;
text-align:center;width:100%;
transition:all 0.1s;
}
.side-btn:active{transform:translateY(1px);}
.side-btn-blue{
background:linear-gradient(180deg,#2D4FBA 0%,#1E2761 100%);
color:#fff;
box-shadow:0 3px 0 #0F1640,0 4px 6px rgba(0,0,0,0.2);
}
.side-btn-blue:hover{background:linear-gradient(180deg,#3D6FCA 0%,#2D3E8F 100%);}
.side-btn-blue:active{box-shadow:0 1px 0 #0F1640;}
.side-btn-green{
background:linear-gradient(180deg,#0FAA7A 0%,#028090 100%);
color:#fff;
box-shadow:0 3px 0 #015060,0 4px 6px rgba(0,0,0,0.2);
}
.side-btn-green:hover{background:linear-gradient(180deg,#1FBA8A 0%,#029090 100%);}
.side-btn-green:active{box-shadow:0 1px 0 #015060;}

display:flex;align-items:center;gap:12px;
margin-top:8px;background:#fff;border-radius:8px;padding:10px 14px;

.visitor-box{display:flex;align-items:center;gap:8px;}
.visitor-lbl{
background:linear-gradient(180deg,#DC2626 0%,#991B1B 100%);
color:#fff;font-weight:bold;padding:5px 10px;
font-size:11px;border-radius:5px;

}
.visitor-inp{width:72px;text-align:right;font-size:12px;border:2px solid #CBD5E1;padding:4px 6px;border-radius:4px;outline:none;}
.visitor-inp:focus{border-color:#1E2761;}
.export-link-btn{
padding:8px 18px;font-size:12px;font-weight:bold;
background:linear-gradient(180deg,#0FAA7A,#028090);
color:#fff;border:none;border-radius:6px;cursor:pointer;
box-shadow:0 3px 0 #015060;
}
.export-link-btn:hover{background:linear-gradient(180deg,#1FBA8A,#029090);}
.export-link-btn:active{transform:translateY(1px);box-shadow:0 1px 0 #015060;}
.reg-btn{
padding:8px 28px;font-size:13px;font-weight:bold;
background:linear-gradient(180deg,#2D4FBA 0%,#1E2761 100%);
color:#fff;border:none;border-radius:6px;cursor:pointer;
box-shadow:0 4px 0 #0F1640,0 5px 8px rgba(0,0,0,0.2);
transition:all 0.1s;
}
.reg-btn:hover{background:linear-gradient(180deg,#3D6FCA 0%,#2D3E8F 100%);}
.reg-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #0F1640;}
.reg-btn.done{background:linear-gradient(180deg,#0FAA7A 0%,#028090 100%);box-shadow:0 4px 0 #015060;}
.reg-btn:disabled{background:linear-gradient(180deg,#94A3B8 0%,#64748B 100%);box-shadow:none;cursor:not-allowed;}
.clear-btn{
padding:8px 16px;font-size:11px;font-weight:bold;
background:linear-gradient(180deg,#FF6666 0%,#CC2222 100%);
color:#fff;border:none;border-radius:6px;cursor:pointer;
box-shadow:0 3px 0 #881111;
}
.clear-btn:hover{background:linear-gradient(180deg,#FF8888 0%,#DD3333 100%);}
.clear-btn:active{transform:translateY(1px);box-shadow:0 1px 0 #881111;}
/* ステータスバー */
.status-bar{
margin-top:6px;padding:5px 12px;
background:#1E2761;border-radius:6px;
font-size:10px;color:#CADCFC;
display:flex;gap:20px;flex-wrap:wrap;

.status-bar span strong{color:#fff;}
/* メッセージ */
.msg{padding:6px 12px;border-radius:4px;margin-top:6px;font-size:11px;display:none;white-space:pre-wrap;}
.msg.success{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;}
.msg.error{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;}
</style>

function getDate(){return document.getElementById('rdate').value;}
function getStoreId(){return currentStoreId||'';}
function fmt(n){return(n||0).toLocaleString('ja-JP');}
function num(v){const n=parseInt((v||'').replace(/[^0-9\-]/g,''),10);return isNaN(n)?0:n;}
function colSum(k,f){return CATS.reduce((s,c)=>s+num(data[c.id][k][f]),0);}

function showMsg(text,type='success'){
const el=document.getElementById('msg');
el.textContent=text;el.className='msg '+type;el.style.display='block';
setTimeout(()=>{el.style.display='none';},4000);
}

function updateCell(catId,colKey,field,val){
data[catId][colKey][field]=val.replace(/[^0-9\-]/g,'');
recalc();
}

function recalc(){
COLS.forEach(col=>{
const sq=document.getElementById('sq_'+col.key);
const sa=document.getElementById('sa_'+col.key);
if(sq)sq.textContent=fmt(colSum(col.key,'q'));
if(sa)sa.textContent=fmt(colSum(col.key,'a'));
});
const pure=SALE_KEYS.reduce((s,k)=>s+colSum(k,'a'),0);
SALE_KEYS.forEach(k=>{const el=document.getElementById('pu_'+k);if(el)el.textContent=fmt(colSum(k,'a'));});
// 消費税（免税列以外すべて計算）
let taxShop=0;
COLS.filter(c=>!c.taxfree&&c.key!=='buy'&&c.key!=='cancel').forEach(col=>{
const tax=Math.floor(colSum(col.key,'a')*10/110);
const el=document.getElementById('tax_'+col.key);
if(el)el.textContent=fmt(tax);
if(col.key==='shop')taxShop=tax;
});
const eg=document.getElementById('genk');if(eg)eg.textContent=fmt(colSum('shop','a'));
document.getElementById('st-sales').innerHTML='<strong>純売上合計：</strong>¥'+fmt(pure);
document.getElementById('st-tax').innerHTML='<strong>消費税：</strong>¥'+fmt(taxShop);
recalcGenk();
}

// 現計自動計算（純売上 - クレジット計 - 掛計）
function recalcGenk(key){
const keys=key?[key]:COLS.filter(c=>c.key!=='buy'&&c.key!=='cancel').map(c=>c.key);
keys.forEach(k=>{
const pure=colSum(k,'a');
const credit=num(document.getElementById('credit_'+k)?.value||'0');
const kake=num(document.getElementById('kakekei_'+k)?.value||'0');
const genk=pure-credit-kake;
const el=document.getElementById('genk_'+k);
if(el)el.textContent=fmt(genk);
});
}

async function loadExistingData(){
const storeId=currentStoreId;
const date=document.getElementById('rdate').value;
if(!storeId||!date)return;
const res=await apiFetch(`daily_reports?report_date=eq.${date}&store_id=eq.${storeId}&select=*`);
const rows=await res.json();
if(!rows||rows.length===0)return;
rows.forEach(row=>{
const cat=CATS.find(c=>c.id===row.category_id);
const col=COLS.find(c=>c.chId===row.channel_id);
if(!cat||!col)return;
data[cat.id][col.key].q=row.quantity>0?String(row.quantity):'';
data[cat.id][col.key].a=row.amount>0?String(row.amount):'';
customerData[col.key]=row.customers||0;
const qEl=document.getElementById(`c${cat.id}_${col.key}_q`);
const aEl=document.getElementById(`c${cat.id}_${col.key}_a`);
if(qEl)qEl.value=row.quantity>0?row.quantity:'';
if(aEl)aEl.value=row.amount>0?row.amount:'';
});
COLS.forEach(col=>{
const el=document.getElementById('cust_'+col.key);
if(el)el.value=customerData[col.key]||0;
});
const visitors=rows.find(r=>r.visitors>0);
if(visitors)document.getElementById('visitors').value=visitors.visitors;
recalc();
}

async function handleSave(){
if(!currentStoreId){showMsg('店舗を選択してください。','error');return;}
const date=document.getElementById('rdate').value;
if(!date){showMsg('日付を選択してください。','error');return;}
const btn=document.getElementById('reg-btn');
btn.disabled=true;btn.textContent='登録中...';
const visitors=parseInt(document.getElementById('visitors').value)||0;
const records=[];
CATS.forEach(cat=>{
COLS.forEach(col=>{
const q=num(data[cat.id][col.key].q);
const a=num(data[cat.id][col.key].a);
if(q===0&&a===0)return;
records.push({report_date:date,store_id:currentStoreId,user_id:null,category_id:cat.id,channel_id:col.chId,quantity:q,amount:a,visitors:visitors,customers:parseInt(customerData[col.key])||0});
});
});
if(records.length===0){showMsg('入力データがありません。','error');btn.disabled=false;btn.textContent='登録';return;}
try{
await apiFetch(`daily_reports?report_date=eq.${date}&store_id=eq.${currentStoreId}`,'DELETE');
const insRes=await apiFetch('daily_reports','POST',records);
if(!insRes.ok){const err=await insRes.text();showMsg('登録エラー：'+err,'error');btn.disabled=false;btn.textContent='登録';return;}
btn.textContent='登録済み ✓';btn.classList.add('done');
showMsg(`✅ ${records.length}件のデータを登録しました。（${date}）`,'success');
setTimeout(()=>{btn.disabled=false;btn.textContent='登録';btn.classList.remove('done');},3000);
}catch(e){
showMsg('通信エラー：'+e.message,'error');btn.disabled=false;btn.textContent='登録';
}
}

function handleClear(){
if(!confirm('入力内容をクリアしますか？'))return;
CATS.forEach(c=>{COLS.forEach(col=>{
data[c.id][col.key]={q:'',a:''};
const eq=document.getElementById('c'+c.id+'_'+col.key+'_q');
const ea=document.getElementById('c'+c.id+'_'+col.key+'_a');
if(eq)eq.value='';if(ea)ea.value='';
});});
COLS.forEach(col=>{
customerData[col.key]='';
const el=document.getElementById('cust_'+col.key);
if(el)el.value='0';
});
document.getElementById('visitors').value='0';
recalc();
}

// Kintoneの丸数字プレフィックス（①②③…）をSupabase側の「1.」「2.」…形式に変換
const CIRCLED_NUMS=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
function kintoneReasonToSupabaseName(kintoneValue){
if(!kintoneValue)return kintoneValue;
const idx=CIRCLED_NUMS.indexOf(kintoneValue.charAt(0));
if(idx===-1)return kintoneValue; // 丸数字が付いていない場合はそのまま
return `${idx+1}.${kintoneValue.slice(1)}`;
}

// ===== Kintone取込（来店動機別・購入明細へ反映） =====
async function handleKintoneImport(){
if(!currentStoreId){showMsg('店舗を選択してください。','error');return;}
const date=document.getElementById('rdate').value;
if(!date){showMsg('日付を選択してください。','error');return;}
const kintoneStoreName=STORE_ID_TO_KINTONE_NAME[currentStoreId];
if(!kintoneStoreName){showMsg('この店舗はKintone店舗対応表に未登録です。','error');return;}

const btn=document.getElementById('kintone-import-btn');
btn.disabled=true;const origText=btn.textContent;btn.textContent='取込中...';

try{
// ① Kintoneから対象日（更新日時ベース）のデータを取得
const url=`/api/kintone?date=${encodeURIComponent(date)}&domain=${encodeURIComponent(KINTONE_DOMAIN)}&token=${encodeURIComponent(KINTONE_TOKEN)}&app=${encodeURIComponent(KINTONE_APP_ID)}`;
const res=await fetch(url);
const json=await res.json();
if(!res.ok||json.error){throw new Error(typeof json.error==='string'?json.error:JSON.stringify(json.error||json));}
const allRecords=json.records||[];

// ② 対象店舗・ステータス確定のみに絞り込み
const records=allRecords.filter(rec=>{
const store=rec['ドロップダウン_4']&&rec['ドロップダウン_4'].value;
const status=rec['ステータス']&&rec['ステータス'].value;
return store===kintoneStoreName&&status==='確定';
});

// ③ 来店動機別に集計
// 客数：確定なら受付結果を問わずカウント／金額：成約のみ加算（キャンセル明細行は除く）
const byReason={};
let repeatCount=0; // 2回目以降（全体・来店動機を問わず）
let noPurchaseCount=0; // 買取不可（全体）
let cancelCount=0; // キャンセル（全体）

records.forEach(rec=>{
const reason=(rec['ドロップダウン_2']&&rec['ドロップダウン_2'].value)||'その他';
const kekka=rec['ドロップダウン_0']&&rec['ドロップダウン_0'].value; // 受付結果
const riraiKubun=rec['ドロップダウン_1']&&rec['ドロップダウン_1'].value; // 初めて/2回目以降

if(!byReason[reason])byReason[reason]={visitors:0,amount:0};
byReason[reason].visitors+=1;

if(riraiKubun==='2回目以降')repeatCount+=1;
if(kekka==='買取不可')noPurchaseCount+=1;
if(kekka==='キャンセル')cancelCount+=1;

if(kekka==='成約'){
const table=(rec['テーブル']&&rec['テーブル'].value)||[];
table.forEach(row=>{
const v=row.value;
const isCancelled=v['キャンセル']&&v['キャンセル'].value&&v['キャンセル'].value.length>0;
if(isCancelled)return;
const amt=Number((v['合計_表示用']&&v['合計_表示用'].value)||0);
byReason[reason].amount+=amt;
});
}
});

const totalVisitors=records.length;
const firstVisitTotal=Math.max(0,totalVisitors-repeatCount);

// ④ 来店動機マスタを取得し、Kintoneの動機名 → visit_reason_id を対応付け
const vrRes=await apiFetch('visit_reasons?select=id,name');
const vrList=await vrRes.json()||[];
const reasonNameToId={};
vrList.forEach(r=>{reasonNameToId[r.name]=r.id;});

const rows=[];
const unmatchedReasons=[];
Object.entries(byReason).forEach(([reasonName,d])=>{
const supabaseName=kintoneReasonToSupabaseName(reasonName);
const vrId=reasonNameToId[supabaseName];
if(!vrId){unmatchedReasons.push(reasonName+' → '+supabaseName);return;}
rows.push({
report_date:date,
store_id:currentStoreId,
visit_reason_id:vrId,
visitors:d.visitors,
amount:d.amount,
first_visit:firstVisitTotal,
repeat_visit:repeatCount,
no_purchase:noPurchaseCount,
cancel_count:cancelCount,
});
});

if(rows.length===0){
showMsg(`⚠ ${date}：対象店舗のKintoneデータが0件、または来店動機が一致しませんでした。`,'error');
btn.disabled=false;btn.textContent=origText;
return;
}

// ⑤ purchase_detailsへ保存（同一店舗・日付の既存データは削除してから再登録）
await apiFetch(`purchase_details?report_date=eq.${date}&store_id=eq.${currentStoreId}`,'DELETE');
const insRes=await apiFetch('purchase_details','POST',rows);
if(!insRes.ok){const err=await insRes.text();throw new Error(err);}

let msg=`✅ ${date}：${kintoneStoreName} の買取明細を${rows.length}件反映しました（来店客数合計：${totalVisitors}人）。`;
let hasWarning=unmatchedReasons.length>0;
if(unmatchedReasons.length)msg+=` ⚠ 未一致の来店動機：${unmatchedReasons.join('、')}`;

// ⑥ 地金回収（金・プラチナ・コンビ・銀）を集計・反映
// 対象：受付結果=成約 のレコードのみ。テーブル内の各行のうち、キャンセル済み行は除外し、
// 「表示用金種」が入力されている行（＝貴金属地金）だけを金種別に重量集計する。
const seiyakuRecords=records.filter(rec=>(rec['ドロップダウン_0']&&rec['ドロップダウン_0'].value)==='成約');
const weightByKintoneMetal={};
seiyakuRecords.forEach(rec=>{
const table=(rec['テーブル']&&rec['テーブル'].value)||[];
table.forEach(row=>{
const v=row.value;
const isCancelled=v['キャンセル']&&v['キャンセル'].value&&v['キャンセル'].value.length>0;
if(isCancelled)return;
const metalName=v['表示用金種']&&v['表示用金種'].value;
if(!metalName)return; // 表示用金種が空＝貴金属地金以外の明細行
const weight=Number((v['シリアル_g_']&&v['シリアル_g_'].value)||0); // 総重量
weightByKintoneMetal[metalName]=(weightByKintoneMetal[metalName]||0)+weight;
});
});

if(Object.keys(weightByKintoneMetal).length>0){
try{
// 金種マスタ取得
const mtRes=await apiFetch('precious_metal_types?is_active=eq.true&order=sort_order&select=id,name');
const metalTypes=await mtRes.json()||[];
const metalNameToId={};
metalTypes.forEach(m=>{metalNameToId[m.name]=m.id;});

// Kintone金種名 → Supabase金種IDごとに重量を合算（対応表で複数のKintone名称が同一Supabase金種に集約される場合あり）
const weightByMetalId={};
const unmatchedMetals=[];
Object.entries(weightByKintoneMetal).forEach(([kName,w])=>{
const supName=KINTONE_METAL_TO_SUPABASE_NAME[kName];
const mid=supName?metalNameToId[supName]:null;
if(!mid){unmatchedMetals.push(kName);return;}
weightByMetalId[mid]=(weightByMetalId[mid]||0)+w;
});

// 前日繰越（各金種の直近next_carry_over）を取得
const coRes=await apiFetch(`gold_recovery?store_id=eq.${currentStoreId}&record_date=lt.${date}&order=record_date.desc&limit=200&select=metal_type_id,record_date,next_carry_over`);
const coData=await coRes.json()||[];
const carryOverData={};
coData.forEach(row=>{
if(carryOverData[row.metal_type_id]===undefined)carryOverData[row.metal_type_id]=row.next_carry_over||0;
});

// ① この日がこの店舗の回収日かどうか（全店共通＋店舗個別）
const [rc1Res,rc2Res]=await Promise.all([
apiFetch(`recovery_calendar?recover_date=eq.${date}&store_id=is.null`),
apiFetch(`recovery_calendar?recover_date=eq.${date}&store_id=eq.${currentStoreId}`),
]);
const rc1=await rc1Res.json()||[];
const rc2=await rc2Res.json()||[];
const isRecoveryDay=(rc1.length+rc2.length)>0;

// ② 既にこの店舗・この日で「回収しないで登録」（is_recovered=false）が手動登録済みかどうか
let manualNotRecovered=false;
if(isRecoveryDay){
const existingRes=await apiFetch(`gold_recovery?store_id=eq.${currentStoreId}&record_date=eq.${date}&is_recovered=eq.false&limit=1&select=id`);
const existingRows=await existingRes.json()||[];
manualNotRecovered=existingRows.length>0;
}
// 回収日かつ、まだ「回収しないで登録」が選ばれていなければ、自動で回収する扱い（累計を0にリセット）
const willAutoRecover=isRecoveryDay&&!manualNotRecovered;

// 金種ごとに1行ずつ作成（既存gold_recovery.htmlの保存ロジックと同じ計算式）
const goldRows=metalTypes.map(m=>{
const carry=carryOverData[m.id]||0;
const today=weightByMetalId[m.id]||0;
const product=0,ret=0;
const crush=carry-product+today;
const recovery=carry+today-product+ret;
const nextCarry=willAutoRecover?0:recovery;
return{
store_id:currentStoreId,
metal_type_id:m.id,
record_date:date,
carry_over:carry,
today_weight:today,
product_weight:product,
crush_weight:crush,
return_weight:ret,
recovery_weight:recovery,
next_carry_over:nextCarry,
is_recovered:willAutoRecover,
};
});

await apiFetch(`gold_recovery?store_id=eq.${currentStoreId}&record_date=eq.${date}`,'DELETE');
const goldInsRes=await apiFetch('gold_recovery','POST',goldRows);
if(!goldInsRes.ok){const err=await goldInsRes.text();throw new Error(err);}

const totalWeight=Object.values(weightByMetalId).reduce((s,w)=>s+w,0);
msg+=`\n✅ 地金回収：本日重量合計${totalWeight.toFixed(2)}gを反映しました。`;
if(isRecoveryDay)msg+=willAutoRecover?'（回収日のため累計をリセットしました）':'（回収しないで登録が選択済みのため累計を維持）';
if(unmatchedMetals.length){msg+=` ⚠ 未一致の金種：${unmatchedMetals.join('、')}`;hasWarning=true;}
}catch(e){
msg+=`\n❌ 地金回収の反映に失敗：${e.message}`;
hasWarning=true;
}
}

// ⑦ テレカ・金券回収（成約のみ・キャンセル明細行は除く）
// ドロップダウン_5（テレカ・金券種類）が入っている行を対象に「数量」（枚数）を集計
const countByKintoneCard={};
seiyakuRecords.forEach(rec=>{
const table=(rec['テーブル']&&rec['テーブル'].value)||[];
table.forEach(row=>{
const v=row.value;
const isCancelled=v['キャンセル']&&v['キャンセル'].value&&v['キャンセル'].value.length>0;
if(isCancelled)return;
const cardName=v['ドロップダウン_5']&&v['ドロップダウン_5'].value;
if(!cardName)return; // テレカ・金券以外の明細行
const qty=Number((v['数量']&&v['数量'].value)||0);
countByKintoneCard[cardName]=(countByKintoneCard[cardName]||0)+qty;
});
});

if(Object.keys(countByKintoneCard).length>0){
try{
const gcRes=await apiFetch('gift_card_types?is_active=eq.true&order=sort_order&select=id,name');
const cardTypes=await gcRes.json()||[];
const cardNameToId={};
cardTypes.forEach(c=>{cardNameToId[c.name]=c.id;});

const countByCardId={};
const unmatchedCards=[];
Object.entries(countByKintoneCard).forEach(([kName,q])=>{
const supName=KINTONE_GIFTCARD_TO_SUPABASE_NAME[kName];
const cid=supName?cardNameToId[supName]:null;
if(!cid){unmatchedCards.push(kName);return;}
countByCardId[cid]=(countByCardId[cid]||0)+q;
});

const tcoRes=await apiFetch(`telecard_recovery?store_id=eq.${currentStoreId}&record_date=lt.${date}&order=record_date.desc&limit=200&select=gift_card_type_id,record_date,next_carry_over`);
const tcoData=await tcoRes.json()||[];
const tCarryOverData={};
tcoData.forEach(row=>{
if(tCarryOverData[row.gift_card_type_id]===undefined)tCarryOverData[row.gift_card_type_id]=row.next_carry_over||0;
});

const telecardRows=cardTypes.map(c=>{
const carry=tCarryOverData[c.id]||0;
const today=countByCardId[c.id]||0;
const rec=0,shop=0;
const next=carry+today-rec-shop;
return{
store_id:currentStoreId,
gift_card_type_id:c.id,
record_date:date,
carry_over:carry,
today_purchase:today,
recovery_count:rec,
shop_sales:shop,
next_carry_over:next,
is_recovered:false,
};
});

await apiFetch(`telecard_recovery?store_id=eq.${currentStoreId}&record_date=eq.${date}`,'DELETE');
const tcInsRes=await apiFetch('telecard_recovery','POST',telecardRows);
if(!tcInsRes.ok){const err=await tcInsRes.text();throw new Error(err);}

const totalCount=Object.values(countByCardId).reduce((s,q)=>s+q,0);
let tcMsg=`✅ テレカ・金券回収：本日買取合計${totalCount}枚を反映しました。`;
if(unmatchedCards.length)tcMsg+=` ⚠ 未一致の種別：${unmatchedCards.join('、')}`;
msg+='\n'+tcMsg;
if(unmatchedCards.length)hasWarning=true;
}catch(e){
msg+=`\n❌ テレカ・金券回収の反映に失敗：${e.message}`;
hasWarning=true;
}
}

showMsg(msg,hasWarning?'error':'success');

btn.textContent='取込完了 ✓';
setTimeout(()=>{btn.disabled=false;btn.textContent=origText;},3000);

}catch(e){
showMsg('❌ Kintone取込エラー：'+e.message,'error');
btn.disabled=false;btn.textContent=origText;
}
}

function handleLogout(){
if(confirm('ログアウトしますか？')){localStorage.clear();window.location.href='login.html';}
}

async function loadStores(){
const res=await apiFetch('stores?is_active=eq.true&order=sort_order');
storeList=await res.json()||[];
const sel=document.getElementById('store');
sel.innerHTML='';
storeList.forEach(s=>{
const o=document.createElement('option');
o.value=s.id;o.textContent=s.name;sel.appendChild(o);
});
// store_idで直接照合
const savedStoreId=localStorage.getItem('store_id')||'';
const savedStoreName=localStorage.getItem('store')||'';
if(savedStoreId){
sel.value=savedStoreId;
if(sel.value===savedStoreId||sel.value===String(savedStoreId)){
currentStoreId=parseInt(savedStoreId);
} else {
for(let i=0;i<sel.options.length;i++){
if(String(sel.options[i].value)===String(savedStoreId)){
sel.selectedIndex=i;
currentStoreId=parseInt(savedStoreId);
break;
}
}
}
}
// store_idで見つからなければ店舗名で照合
if(!currentStoreId&&savedStoreName){
for(let i=0;i<sel.options.length;i++){
if(sel.options[i].text===savedStoreName){
sel.selectedIndex=i;
currentStoreId=parseInt(sel.options[i].value);
break;
}
}
}
// それでもなければ先頭を選択
if(!currentStoreId&&storeList.length>0){
currentStoreId=parseInt(storeList[0].id);
sel.value=storeList[0].id;
}
const selText=sel.options[sel.selectedIndex]?.text||'';
document.getElementById('st-store').innerHTML='<strong>店舗：</strong>'+selText;
}

async function init(){
// 日付セット
const t=new Date();
const ds=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
document.getElementById('rdate').value=ds;
document.getElementById('st-date').innerHTML='<strong>日付：</strong>'+ds;
// ユーザー情報
const savedUser=localStorage.getItem('userid')||'';
const savedName=localStorage.getItem('user_name')||'';
const savedStoreNameInit=localStorage.getItem('store')||'';
document.getElementById('user-info').textContent='ログイン中：'+(savedName||savedUser)+' 店舗：'+savedStoreNameInit;
document.getElementById('st-user').innerHTML='<strong>ユーザー：</strong>'+(savedName||savedUser);
// ① 商品カテゴリをDBから取得
const catRes=await fetch(SUPABASE_URL+'/rest/v1/product_categories?is_active=eq.true&order=sort_order',{
headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
});
CATS=await catRes.json()||[];
// dataを初期化
CATS.forEach(c=>{
data[c.id]={};
COLS.forEach(col=>{data[c.id][col.key]={q:'',a:''};});
});
// ② テーブルを構築
buildTable();
recalc();
// ③ 店舗一覧を取得
await loadStores();
// ④ 既存データを読み込み
await loadExistingData();
// イベントリスナー
document.getElementById('rdate').addEventListener('change',async function(){
document.getElementById('st-date').innerHTML='<strong>日付：</strong>'+this.value;
handleClear();
await loadExistingData();
});
document.getElementById('store').addEventListener('change',async function(){
currentStoreId=parseInt(this.value);
const txt=this.options[this.selectedIndex].text;
localStorage.setItem('store',txt);
localStorage.setItem('store_id',this.value);
document.getElementById('st-store').innerHTML='<strong>店舗：</strong>'+txt;
const savedNameChg=localStorage.getItem('user_name')||localStorage.getItem('userid')||'';
document.getElementById('user-info').textContent='ログイン中：'+savedNameChg+' 店舗：'+txt;
handleClear();
await loadExistingData();
});
// CSS変数で2行目のtopを設定
function setHdrTop(){
const row1=document.querySelector('#tbl-main thead tr:first-child');
if(row1&&row1.offsetHeight>0){
const h=row1.offsetHeight;
document.getElementById('tbl-main').style.setProperty('--hdr1-h', h+'px');
} else {
setTimeout(setHdrTop,100);
}
}
setTimeout(setHdrTop,100);
}
init();
</script>
