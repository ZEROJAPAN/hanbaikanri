<script>
const SUPABASE_URL='https://fvkssslpmjtykxoulfmf.supabase.co';
const SUPABASE_KEY='sb_publishable_cE7_r5efkdwSM7YM_8qZmw_6Cxrwfpk';

async function apiFetch(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}};
  if(body){opts.headers['Content-Type']='application/json';opts.headers['Prefer']='return=minimal';opts.body=JSON.stringify(body);}
  return await fetch(SUPABASE_URL+'/rest/v1/'+path,opts);
}

// 商品カテゴリ・チャネル定義
const CATS=[
  {id:1,name:'1.金'},{id:2,name:'2.プラチナ'},{id:3,name:'3.コンビ'},
  {id:4,name:'4.ジュエリー'},{id:5,name:'5.時計'},{id:6,name:'6.ブランド品'},
  {id:7,name:'7.テレカ・金券類（非課税）'},{id:8,name:'8.お酒'},{id:9,name:'9.その他'},
  {id:10,name:'10.切手・印紙'},{id:11,name:'サービス券値引き'},{id:12,name:'返品・ジュエリー'},
];
const COLS=[
  {key:'buy',chId:1},{key:'cancel',chId:2},{key:'shop',chId:3},{key:'free',chId:4},
  {key:'honten',chId:5},{key:'raku',chId:6},{key:'rakuEx',chId:7},{key:'yahoo',chId:8},
  {key:'yahuoku',chId:9},{key:'wowma',chId:10},{key:'merukari',chId:11},{key:'ebay',chId:12},
  {key:'lux',chId:13},{key:'amazon',chId:14},{key:'subscr',chId:15},{key:'rakuma',chId:16},
  {key:'qoo10',chId:17},{key:'globa',chId:18},{key:'auction',chId:19},{key:'web',chId:20},
  {key:'other',chId:21},
];
const SALE_KEYS=COLS.filter(c=>c.key!=='buy'&&c.key!=='cancel').map(c=>c.key);

const data={};
CATS.forEach(c=>{data[c.id]={};COLS.forEach(col=>{data[c.id][col.key]={q:'',a:''};});});

let storeList=[];
let currentStoreId=null;
let currentUserId=null;

function fmt(n){return(n||0).toLocaleString('ja-JP');}
function num(v){const n=parseInt((v||'').replace(/[^0-9\-]/g,''),10);return isNaN(n)?0:n;}
function colSum(k,f){return CATS.reduce((s,c)=>s+num(data[c.id][k][f]),0);}

function showMsg(text,type='success'){
  const el=document.getElementById('msg');
  el.textContent=text;el.className='msg '+type;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},4000);
}

function updateCell(catId,colKey,field,val){
  data[catId][colKey][field]=val.replace(/[^0-9\-]/g,'');
  recalc();
}

function recalc(){
  COLS.forEach(col=>{
    const sq=document.getElementById('sq_'+col.key);
    const sa=document.getElementById('sa_'+col.key);
    if(sq)sq.textContent=fmt(colSum(col.key,'q'));
    if(sa)sa.textContent=fmt(colSum(col.key,'a'));
  });
  const pure=SALE_KEYS.reduce((s,k)=>s+colSum(k,'a'),0);
  SALE_KEYS.forEach(k=>{const el=document.getElementById('pu_'+k);if(el)el.textContent=fmt(colSum(k,'a'));});
  const tax=Math.floor(colSum('shop','a')*10/110);
  const taxH=Math.floor(colSum('honten','a')*10/110);
  const et=document.getElementById('tax_shop');if(et)et.textContent=fmt(tax);
  const eth=document.getElementById('tax_hon');if(eth)eth.textContent=fmt(taxH);
  const eg=document.getElementById('genk');if(eg)eg.textContent=fmt(colSum('shop','a'));
  document.getElementById('st-sales').textContent='純売上合計：¥'+fmt(pure);
  document.getElementById('st-tax').textContent='消費税：¥'+fmt(tax);
}

function buildTable(){
  const tbody=document.getElementById('tbl-body');
  let h='';
  CATS.forEach(c=>{
    h+=`<tr><td class="cat-td">${c.name}</td>`;
    COLS.forEach(col=>{
      h+=`<td class="td-qty"><input type="text" inputmode="numeric" id="c${c.id}_${col.key}_q" oninput="updateCell(${c.id},'${col.key}','q',this.value)"></td>`;
      h+=`<td class="td-amt"><input type="text" inputmode="numeric" id="c${c.id}_${col.key}_a" oninput="updateCell(${c.id},'${col.key}','a',this.value)"></td>`;
    });
    h+=`</tr>`;
  });

  // 計行
  h+=`<tr><td class="sum-label">計</td>`;
  COLS.forEach(col=>{h+=`<td class="sum-qty" id="sq_${col.key}">0</td><td class="sum-amt" id="sa_${col.key}">0</td>`;});
  h+=`</tr>`;

  // 純売上行
  h+=`<tr><td class="sum-label">純売上</td>`;
  COLS.forEach(col=>{
    if(col.key==='buy'||col.key==='cancel'){h+=`<td class="gray-qty"></td><td class="gray-amt"></td>`;}
    else{h+=`<td class="gray-qty"></td><td class="sum-amt" id="pu_${col.key}">0</td>`;}
  });
  h+=`</tr>`;

  // 消費税行
  h+=`<tr><td class="sum-label">消費税</td>`;
  COLS.forEach(col=>{
    if(col.key==='shop'){h+=`<td class="gray-qty"></td><td class="sum-amt" id="tax_shop">0</td>`;}
    else if(col.key==='honten'){h+=`<td class="gray-qty"></td><td class="sum-amt" id="tax_hon">0</td>`;}
    else{h+=`<td class="gray-qty"></td><td class="gray-amt"></td>`;}
  });
  h+=`</tr>`;

  // 現計行
  h+=`<tr><td class="sum-label">現計</td>`;
  COLS.forEach(col=>{
    if(col.key==='shop'){h+=`<td class="gray-qty"></td><td class="sum-amt" id="genk">0</td>`;}
    else{h+=`<td class="gray-qty"></td><td class="gray-amt"></td>`;}
  });
  h+=`</tr>`;

  // 掛計行
  h+=`<tr><td class="sum-label">掛計</td>`;
  COLS.forEach(col=>{
    if(col.key==='shop'){h+=`<td class="gray-qty"></td><td class="sum-amt">0</td>`;}
    else{h+=`<td class="gray-qty"></td><td class="gray-amt"></td>`;}
  });
  h+=`</tr>`;

  // 客数行
  h+=`<tr><td class="sum-label">客数</td>`;
  COLS.forEach(()=>{
    h+=`<td class="gray-qty"></td><td class="td-amt"><input type="text" inputmode="numeric" value="0" style="width:80px;border:none;background:#fff;font-size:10px;text-align:right;padding:1px 3px;outline:none;"></td>`;
  });
  h+=`</tr>`;

  tbody.innerHTML=h;
}

// 既存データを読み込む
async function loadExistingData(){
  const storeId=currentStoreId;
  const date=document.getElementById('rdate').value;
  if(!storeId||!date)return;

  const res=await apiFetch(`daily_reports?report_date=eq.${date}&store_id=eq.${storeId}&select=*`);
  const rows=await res.json();
  if(!rows||rows.length===0)return;

  // 既存データをセット
  rows.forEach(row=>{
    const cat=CATS.find(c=>c.id===row.category_id);
    const col=COLS.find(c=>c.chId===row.channel_id);
    if(!cat||!col)return;
    data[cat.id][col.key].q=row.quantity>0?String(row.quantity):'';
    data[cat.id][col.key].a=row.amount>0?String(row.amount):'';
    const qEl=document.getElementById(`c${cat.id}_${col.key}_q`);
    const aEl=document.getElementById(`c${cat.id}_${col.key}_a`);
    if(qEl)qEl.value=row.quantity>0?row.quantity:'';
    if(aEl)aEl.value=row.amount>0?row.amount:'';
  });

  // 来店客数
  const visitors=rows.find(r=>r.visitors>0);
  if(visitors)document.getElementById('visitors').value=visitors.visitors;

  recalc();
}

// 登録処理
async function handleSave(){
  if(!currentStoreId){showMsg('店舗を選択してください。','error');return;}
  const date=document.getElementById('rdate').value;
  if(!date){showMsg('日付を選択してください。','error');return;}

  const btn=document.getElementById('reg-btn');
  btn.disabled=true;btn.textContent='登録中...';

  const visitors=parseInt(document.getElementById('visitors').value)||0;

  // 登録データを配列で作成
  const records=[];
  CATS.forEach(cat=>{
    COLS.forEach(col=>{
      const q=num(data[cat.id][col.key].q);
      const a=num(data[cat.id][col.key].a);
      if(q===0&&a===0)return; // 0は省略
      records.push({
        report_date:date,
        store_id:currentStoreId,
        user_id:currentUserId||null,
        category_id:cat.id,
        channel_id:col.chId,
        quantity:q,
        amount:a,
        visitors:visitors,
      });
    });
  });

  if(records.length===0){
    showMsg('入力データがありません。','error');
    btn.disabled=false;btn.textContent='登録';
    return;
  }

  try{
    // 既存データを削除してから再登録（UPSERT）
    const delRes=await apiFetch(
      `daily_reports?report_date=eq.${date}&store_id=eq.${currentStoreId}`,
      'DELETE'
    );

    if(!delRes.ok&&delRes.status!==404){
      const err=await delRes.text();
      showMsg('削除エラー：'+err,'error');
      btn.disabled=false;btn.textContent='登録';
      return;
    }

    // 新規登録
    const insRes=await apiFetch('daily_reports','POST',records);

    if(!insRes.ok){
      const err=await insRes.text();
      showMsg('登録エラー：'+err,'error');
      btn.disabled=false;btn.textContent='登録';
      return;
    }

    btn.textContent='登録済み ✓';btn.classList.add('done');
    showMsg(`✅ ${records.length}件のデータを登録しました。（${date}）`,'success');
    setTimeout(()=>{btn.disabled=false;btn.textContent='登録';btn.classList.remove('done');},3000);

  }catch(e){
    showMsg('通信エラー：'+e.message,'error');
    btn.disabled=false;btn.textContent='登録';
  }
}

function handleClear(){
  if(!confirm('入力内容をクリアしますか？'))return;
  CATS.forEach(c=>{COLS.forEach(col=>{
    data[c.id][col.key]={q:'',a:''};
    const eq=document.getElementById('c'+c.id+'_'+col.key+'_q');
    const ea=document.getElementById('c'+c.id+'_'+col.key+'_a');
    if(eq)eq.value='';if(ea)ea.value='';
  });});
  document.getElementById('visitors').value='0';
  recalc();
}

function handleLogout(){
  if(confirm('ログアウトしますか？')){localStorage.clear();window.location.href='login.html';}
}

// 店舗一覧をDBから取得
async function loadStores(){
  const res=await apiFetch('stores?is_active=eq.true&order=sort_order');
  storeList=await res.json()||[];
  const sel=document.getElementById('store');
  sel.innerHTML='';
  storeList.forEach(s=>{
    const o=document.createElement('option');
    o.value=s.id;o.textContent=s.name;sel.appendChild(o);
  });

  // ログイン時の店舗を選択
  const savedStore=localStorage.getItem('store')||'';
  const matched=storeList.find(s=>s.name===savedStore);
  if(matched){
    sel.value=matched.id;
    currentStoreId=matched.id;
  } else if(storeList.length>0){
    currentStoreId=storeList[0].id;
  }
  document.getElementById('st-store').textContent='店舗：'+sel.options[sel.selectedIndex]?.text;
}

// 初期化
async function init(){
  // 日付セット
  const t=new Date();
  const ds=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  document.getElementById('rdate').value=ds;
  document.getElementById('st-date').textContent='日付：'+ds;

  // ユーザー情報
  const savedUser=localStorage.getItem('userid')||'';
  const savedName=localStorage.getItem('user_name')||'';
  document.getElementById('st-user').textContent='ユーザー：'+(savedName||savedUser);

  // テーブル構築
  buildTable();
  recalc();

  // 店舗読み込み
  await loadStores();

  // 既存データ読み込み
  await loadExistingData();

  // 日付変更時
  document.getElementById('rdate').addEventListener('change',async function(){
    document.getElementById('st-date').textContent='日付：'+this.value;
    handleClear();
    await loadExistingData();
  });

  // 店舗変更時
  document.getElementById('store').addEventListener('change',async function(){
    currentStoreId=parseInt(this.value);
    localStorage.setItem('store',this.options[this.selectedIndex].text);
    document.getElementById('st-store').textContent='店舗：'+this.options[this.selectedIndex].text;
    handleClear();
    await loadExistingData();
  });
}

init();
</script>
