<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>買取明細 - ゼロジャパン</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Meiryo','MS Gothic','Yu Gothic',sans-serif;font-size:12px;background:#90ee90;}
.wrap{padding:6px;}
/* トップバー */
.topbar{display:flex;align-items:center;justify-content:space-between;background:#1E2761;border-radius:8px;padding:8px 14px;margin-bottom:8px;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-size:14px;font-weight:bold;color:#fff;}
.back-btn{padding:5px 14px;background:#fff;color:#1E2761;border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;}
.back-btn:hover{background:#EEF2FF;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.store-name{font-size:12px;font-weight:bold;color:#9FE1CB;}
.date-name{font-size:12px;font-weight:bold;color:#fff;}
.logout-btn{padding:5px 12px;background:#fff;color:#1E2761;border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;}
/* アラート */
.alert-bar{
background:#FEF3C7;border:2px solid #F59E0B;border-radius:6px;
padding:8px 14px;margin-bottom:8px;font-size:12px;color:#92400E;
font-weight:bold;display:none;
}
.alert-bar.error{background:#FEE2E2;border-color:#DC2626;color:#991B1B;}
.alert-bar.success{background:#D1FAE5;border-color:#059669;color:#065F46;}
/* メインエリア */
.main{background:#fff;border-radius:8px;padding:14px;}
/* 来店確認バー */
.check-bar{
display:flex;align-items:center;gap:16px;
background:#EEF2FF;border:1px solid #C7D2FE;
border-radius:6px;padding:8px 14px;margin-bottom:14px;
font-size:12px;
}
.check-item{display:flex;align-items:center;gap:6px;}
.check-label{color:#475569;font-weight:bold;}
.check-value{font-size:14px;font-weight:bold;color:#1E2761;}
.check-value.ok{color:#059669;}
.check-value.ng{color:#DC2626;}
.check-badge{
padding:3px 10px;border-radius:10px;font-size:11px;font-weight:bold;
}
.check-badge.ok{background:#D1FAE5;color:#065F46;}
.check-badge.ng{background:#FEE2E2;color:#991B1B;}
/* テーブル */
table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px;}
th{background:#1E2761;color:#fff;padding:8px 10px;text-align:center;font-size:11px;white-space:nowrap;}
th.left{text-align:left;}
td{padding:6px 8px;border-bottom:1px solid #E2E8F0;vertical-align:middle;}
tr:nth-child(even) td{background:#F8FAFC;}
.reason-td{color:#334155;font-size:11px;}
.num-td{text-align:right;}
.sum-row td{background:#FFF9C4!important;font-weight:bold;font-size:12px;}
.sum-row .reason-td{text-align:center;color:#1E2761;}
/* 入力 */
.inp{
width:80px;text-align:right;font-size:11px;
border:1.5px solid #CBD5E1;border-radius:3px;
padding:3px 4px;outline:none;
}
.inp:focus{border-color:#1E2761;}
.inp-yellow{background:#FFFDE7;}
.inp-white{background:#fff;}
/* 集計カード */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.sum-card{background:#EEF2FF;border:1px solid #C7D2FE;border-radius:6px;padding:10px 14px;}
.sum-card-title{font-size:11px;color:#475569;font-weight:bold;margin-bottom:4px;}
.sum-card-value{font-size:18px;font-weight:bold;color:#1E2761;}
.sum-card.green{background:#D1FAE5;border-color:#6EE7B7;}
.sum-card.green .sum-card-value{color:#065F46;}
.sum-card.red{background:#FEE2E2;border-color:#FCA5A5;}
.sum-card.red .sum-card-value{color:#991B1B;}
.sum-card.yellow{background:#FFF9C4;border-color:#FCD34D;}
.sum-card.yellow .sum-card-value{color:#92400E;}
/* 買取不可・キャンセル */
.extra-section{
background:#F8FAFC;border:1px solid #E2E8F0;
border-radius:6px;padding:10px 14px;margin-bottom:14px;
}
.extra-title{font-size:12px;font-weight:bold;color:#475569;margin-bottom:8px;}
.extra-row{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.extra-label{font-size:12px;color:#334155;min-width:100px;}
.extra-inp{
width:80px;text-align:right;font-size:12px;
border:1.5px solid #CBD5E1;border-radius:3px;
padding:4px 6px;outline:none;background:#fff;
}
.extra-inp:focus{border-color:#1E2761;}
/* 率カード */
.rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.rate-card{
border-radius:6px;padding:10px 14px;text-align:center;
border:1px solid;
}
.rate-card.cancel{background:#FEE2E2;border-color:#FCA5A5;}
.rate-card.repeat{background:#D1FAE5;border-color:#6EE7B7;}
.rate-title{font-size:11px;font-weight:bold;margin-bottom:4px;}
.rate-cancel .rate-title{color:#991B1B;}
.rate-repeat .rate-title{color:#065F46;}
.rate-value{font-size:22px;font-weight:bold;}
.rate-card.cancel .rate-value{color:#DC2626;}
.rate-card.repeat .rate-value{color:#059669;}
/* 登録ボタン */
.reg-btn{
padding:10px 32px;font-size:13px;font-weight:bold;
background:linear-gradient(180deg,#2D4FBA 0%,#1E2761 100%);
color:#fff;border:none;border-radius:6px;cursor:pointer;
box-shadow:0 4px 0 #0F1640;width:100%;
}
.reg-btn:hover{background:linear-gradient(180deg,#3D6FCA 0%,#2D3E8F 100%);}
.reg-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #0F1640;}
.reg-btn:disabled{background:#94A3B8;box-shadow:none;cursor:not-allowed;}
.reg-btn.done{background:linear-gradient(180deg,#0FAA7A 0%,#028090 100%);box-shadow:0 4px 0 #015060;}
</style>
</head>
<body>
<div class="wrap">
<!-- トップバー -->
<div class="topbar">
<div class="topbar-left">
<button type="button" class="back-btn" id="back-btn">◀ 日報に戻る</button>
<div class="topbar-title">🛒 買取明細</div>
</div>
<div class="topbar-right">
<span class="store-name" id="store-name"></span>
<span class="date-name" id="date-name"></span>
<button type="button" class="logout-btn" onclick="handleLogout()">🏠 ログアウト</button>
</div>
</div>

<!-- アラートバー -->
<div class="alert-bar" id="alert-bar"></div>

<div class="main">
<!-- 来店確認バー -->
<div class="check-bar">
<div class="check-item">
<span class="check-label">日報の来店客数：</span>
<span class="check-value" id="daily-visitors">-</span>
</div>
<div class="check-item">
<span class="check-label">ご来店合計：</span>
<span class="check-value" id="total-visitors">0</span>
</div>
<div class="check-item">
<span id="check-badge" class="check-badge">確認中</span>
</div>
</div>

<!-- 集計カード -->
<div class="summary-grid">
<div class="sum-card">
<div class="sum-card-title">ご来店合計（客数）</div>
<div class="sum-card-value" id="sum-visitors">0</div>
</div>
<div class="sum-card yellow">
<div class="sum-card-title">買取金額合計</div>
<div class="sum-card-value" id="sum-amount">¥0</div>
</div>
<div class="sum-card green">
<div class="sum-card-title">初回ご来店</div>
<div class="sum-card-value" id="sum-first">0</div>
</div>
<div class="sum-card">
<div class="sum-card-title">2回目以降</div>
<div class="sum-card-value" id="sum-repeat">0</div>
</div>
</div>

<!-- 来店動機テーブル -->
<table>
<thead>
<tr>
<th class="left" style="width:200px;">来店動機</th>
<th style="width:70px;text-align:left;padding-left:8px;">客数</th>
<th style="width:90px;text-align:left;padding-left:8px;">金額</th>
<th></th>
</tr>
</thead>
<tbody id="reason-list"></tbody>
<tfoot>
<tr class="sum-row">
<td class="reason-td">ご来店合計</td>
<td style="padding:4px 4px 4px 6px;font-weight:bold;" id="foot-visitors">0</td>
<td style="padding:4px 4px 4px 6px;font-weight:bold;" id="foot-amount">¥0</td>
<td></td>
</tr>
<tr class="sum-row" style="background:#D1FAE5!important;">
<td class="reason-td" style="color:#065F46;">初回ご来店</td>
<td style="padding:4px 4px 4px 6px;font-weight:bold;color:#065F46;" id="foot-first">0</td>
<td style="background:#c0c0c0;"></td>
<td></td>
</tr>
<tr class="sum-row" style="background:#EEF2FF!important;">
<td class="reason-td" style="color:#1E2761;">2回目以降</td>
<td style="padding:4px 4px 4px 6px;">
<input type="text" inputmode="numeric" id="repeat-input" value="0"
oninput="recalc()"
style="width:60px;text-align:right;font-size:11px;border:1.5px solid #C7D2FE;border-radius:3px;padding:3px 4px;outline:none;background:#EEF2FF;font-weight:bold;">
</td>
<td style="background:#c0c0c0;"></td>
<td></td>
</tr>
</tfoot>
</table>

<!-- 買取不可・キャンセル -->
<div class="extra-section">
<div class="extra-title">買取結果</div>
<div class="extra-row">
<span class="extra-label">買取不可</span>
<input type="text" inputmode="numeric" class="extra-inp" id="no-purchase" value="0" oninput="recalc()">
<span style="font-size:11px;color:#64748B;">件</span>
</div>
<div class="extra-row">
<span class="extra-label">キャンセル</span>
<input type="text" inputmode="numeric" class="extra-inp" id="cancel-count" value="0" oninput="recalc()">
<span style="font-size:11px;color:#64748B;">件</span>
</div>
</div>

<!-- 率カード -->
<div class="rate-grid">
<div class="rate-card cancel">
<div class="rate-title" style="color:#991B1B;">キャンセル率</div>
<div class="rate-value" style="color:#DC2626;" id="cancel-rate">0.0%</div>
</div>
<div class="rate-card repeat">
<div class="rate-title" style="color:#065F46;">リピーター率</div>
<div class="rate-value" style="color:#059669;" id="repeat-rate">0.0%</div>
</div>
</div>

<!-- 登録ボタン -->
<button type="button" class="reg-btn" id="reg-btn" onclick="handleSave()">登録</button>
</div>
</div>

<script>
const SUPABASE_URL='https://fvkssslpmjtykxoulfmf.supabase.co';
const SUPABASE_KEY='sb_publishable_cE7_r5efkdwSM7YM_8qZmw_6Cxrwfpk';

async function apiFetch(path,method='GET',body=null){
const opts={method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}};
if(body){opts.headers['Content-Type']='application/json';opts.headers['Prefer']='return=minimal';opts.body=JSON.stringify(body);}
return await fetch(SUPABASE_URL+'/rest/v1/'+path,opts);
}

function fmt(n){return(n||0).toLocaleString('ja-JP');}
function num(v){const n=parseInt((v||'').toString().replace(/[^0-9\-]/g,''),10);return isNaN(n)?0:n;}

function showAlert(msg,type='error'){
const el=document.getElementById('alert-bar');
el.textContent=msg;el.className='alert-bar '+type;el.style.display='block';
if(type!=='error')setTimeout(()=>el.style.display='none',4000);
}

// URLパラメータ取得
const params=new URLSearchParams(location.search);
const reportDate=params.get('date')||'';
const storeId=params.get('store')||'';
const storeName=localStorage.getItem('store')||'';

let dailyVisitors=0;
let reasonList=[];
let inputData={};

// 初期化
async function init(){
// 戻るボタン
document.getElementById('back-btn').onclick=()=>{
location.href=`daily.html`;
};

document.getElementById('store-name').textContent=storeName;
document.getElementById('date-name').textContent=reportDate;

// 来店動機一覧を取得
const res=await apiFetch('visit_reasons?is_active=eq.true&order=sort_order');
reasonList=await res.json()||[];

// 日報の来店客数を取得
if(reportDate&&storeId){
const dres=await apiFetch(`daily_reports?report_date=eq.${reportDate}&store_id=eq.${storeId}&visitors=gt.0&select=visitors&limit=1`);
const ddata=await dres.json();
if(ddata&&ddata.length>0){
dailyVisitors=ddata[0].visitors;
}
document.getElementById('daily-visitors').textContent=dailyVisitors;

// 既存データ読み込み
const eres=await apiFetch(`purchase_details?report_date=eq.${reportDate}&store_id=eq.${storeId}&select=*`);
const edata=await eres.json()||[];
edata.forEach(row=>{
inputData[row.visit_reason_id]={
visitors:row.visitors,
amount:row.amount,
repeat:row.repeat_visit,
no_purchase:row.no_purchase,
cancel:row.cancel_count,
};
});

// 買取不可・キャンセル・2回目以降をセット（buildTable/recalcより前に確実に反映）
const firstRow=edata[0];
if(firstRow){
document.getElementById('no-purchase').value=firstRow.no_purchase||0;
document.getElementById('cancel-count').value=firstRow.cancel_count||0;
document.getElementById('repeat-input').value=firstRow.repeat_visit||0;
}
}

buildTable();
recalc();
}

function buildTable(){
const tbody=document.getElementById('reason-list');
let h='';
reasonList.forEach(r=>{
const d=inputData[r.id]||{visitors:0,amount:0,repeat:0};
h+=`<tr>
<td class="reason-td">${r.name}</td>
<td style="padding:4px 4px 4px 6px;">
<input type="text" inputmode="numeric"
id="v_${r.id}" value="${d.visitors||''}"
oninput="recalc()" style="width:60px;text-align:right;font-size:11px;border:1.5px solid #CBD5E1;border-radius:3px;padding:3px 4px;outline:none;background:#FFFDE7;">
</td>
<td style="padding:4px 4px 4px 6px;">
<input type="text" inputmode="numeric"
id="a_${r.id}" value="${d.amount||''}"
oninput="recalc()" style="width:80px;text-align:right;font-size:11px;border:1.5px solid #CBD5E1;border-radius:3px;padding:3px 4px;outline:none;background:#fff;">
</td>
<td></td>
</tr>`;
});
tbody.innerHTML=h;
}

function recalc(){
let totalV=0,totalA=0,totalR=0;
reasonList.forEach(r=>{
totalV+=num(document.getElementById('v_'+r.id)?.value);
totalA+=num(document.getElementById('a_'+r.id)?.value);
totalR+=num(document.getElementById('r_'+r.id)?.value);
});

// 初回＝合計－2回目以降
const firstVisit=totalV-totalR;

// 2回目以降は専用入力欄から取得
const totalR2=num(document.getElementById('repeat-input')?.value||'0');
const firstVisit2=totalV-totalR2;

// 集計カード更新
document.getElementById('sum-visitors').textContent=fmt(totalV);
document.getElementById('sum-amount').textContent='¥'+fmt(totalA);
document.getElementById('sum-first').textContent=fmt(firstVisit2<0?0:firstVisit2);
document.getElementById('sum-repeat').textContent=fmt(totalR2);
document.getElementById('total-visitors').textContent=totalV;

// フッター
document.getElementById('foot-visitors').textContent=fmt(totalV);
document.getElementById('foot-amount').textContent='¥'+fmt(totalA);
const ff=document.getElementById('foot-first');
if(ff)ff.textContent=fmt(firstVisit2<0?0:firstVisit2);

// 来店確認チェック
const badge=document.getElementById('check-badge');
const dailyV=document.getElementById('daily-visitors');
if(dailyVisitors===0){
badge.textContent='日報未入力';badge.className='check-badge';
dailyV.className='check-value';
} else if(totalV===dailyVisitors){
badge.textContent='✅ 一致';badge.className='check-badge ok';
dailyV.className='check-value ok';
document.getElementById('alert-bar').style.display='none';
} else {
badge.textContent='❌ 不一致';badge.className='check-badge ng';
dailyV.className='check-value ng';
showAlert(`⚠️ 来店客数が一致していません。日報：${dailyVisitors}人 / ご来店合計：${totalV}人`,'error');
}

// キャンセル率・リピーター率
const cancelCount=num(document.getElementById('cancel-count').value);
const noPurchase=num(document.getElementById('no-purchase').value);
const buyCount=totalV-cancelCount-noPurchase;
const cancelRate=totalV>0?(cancelCount/(buyCount+cancelCount)*100):0;
const repeatRate=totalV>0?(totalR2/totalV*100):0;
document.getElementById('cancel-rate').textContent=cancelRate.toFixed(1)+'%';
document.getElementById('repeat-rate').textContent=repeatRate.toFixed(1)+'%';
}

async function handleSave(){
// 来店人数チェック
let totalV=0;
reasonList.forEach(r=>{totalV+=num(document.getElementById('v_'+r.id)?.value);});
if(dailyVisitors>0&&totalV!==dailyVisitors){
showAlert(`来店客数が一致していないため登録できません。\n日報：${dailyVisitors}人 / ご来店合計：${totalV}人`,'error');
return;
}

const btn=document.getElementById('reg-btn');
btn.disabled=true;btn.textContent='登録中...';

const cancelCount=num(document.getElementById('cancel-count').value);
const noPurchase=num(document.getElementById('no-purchase').value);

try{
// 既存データ削除
await apiFetch(`purchase_details?report_date=eq.${reportDate}&store_id=eq.${storeId}`,'DELETE');

// 新規登録
const records=[];
const totalRepeat=num(document.getElementById('repeat-input')?.value||'0');
let totalV2=0;
reasonList.forEach(r=>{totalV2+=num(document.getElementById('v_'+r.id)?.value);});
const firstVisitTotal=totalV2-totalRepeat<0?0:totalV2-totalRepeat;

reasonList.forEach(r=>{
const v=num(document.getElementById('v_'+r.id)?.value);
const a=num(document.getElementById('a_'+r.id)?.value);
if(v===0&&a===0)return;
records.push({
report_date:reportDate,
store_id:parseInt(storeId),
visit_reason_id:r.id,
visitors:v,
amount:a,
first_visit:firstVisitTotal,
repeat_visit:totalRepeat,
no_purchase:noPurchase,
cancel_count:cancelCount,
});
});

if(records.length>0){
const res=await apiFetch('purchase_details','POST',records);
if(!res.ok){const err=await res.text();showAlert('登録エラー：'+err,'error');btn.disabled=false;btn.textContent='登録';return;}
}

btn.textContent='登録済み ✓';btn.classList.add('done');
showAlert('✅ 登録しました。','success');
setTimeout(()=>{btn.disabled=false;btn.textContent='登録';btn.classList.remove('done');},3000);
}catch(e){
showAlert('通信エラー：'+e.message,'error');
btn.disabled=false;btn.textContent='登録';
}
}

function handleLogout(){
if(confirm('ログアウトしますか？')){localStorage.clear();window.location.href='login.html';}
}

init();
</script>
</body>
</html>
