<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エリア／課マスタ</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Meiryo','MS Gothic','Yu Gothic',sans-serif;font-size:12px;background:#90ee90;}
.wrap{padding:4px;}
.nav-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px;align-items:center;}
.nbtn{padding:2px 8px;font-size:11px;font-weight:bold;border:1px solid #555;border-radius:2px;cursor:pointer;background:#ffff99;color:#000;white-space:nowrap;}
.nbtn.master{background:#ff8888;}
.nbtn.active{background:#ffff00;}
.nbtn.logout{background:#fff;}
.main{padding:12px;background:#fff;border-radius:6px;margin-top:6px;}
.page-title{font-size:16px;font-weight:bold;color:#1E2761;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #1E2761;}
.add-btn{padding:6px 16px;background:#1E2761;color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:bold;cursor:pointer;margin-bottom:12px;}
.add-btn:hover{background:#028090;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#1E2761;color:#fff;padding:8px 10px;text-align:left;white-space:nowrap;font-size:11px;}
td{padding:7px 10px;border-bottom:1px solid #E2E8F0;vertical-align:middle;}
tr:hover td{background:#F8FAFC;}
tr:nth-child(even) td{background:#F8FAFC;}
.badge-active{background:#D1FAE5;color:#065F46;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold;}
.badge-inactive{background:#FEE2E2;color:#991B1B;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold;}
.edit-btn{padding:3px 10px;background:#028090;color:#fff;border:none;border-radius:3px;font-size:11px;cursor:pointer;margin-right:4px;}
.toggle-btn{padding:3px 10px;border:none;border-radius:3px;font-size:11px;cursor:pointer;}
.toggle-btn.deactivate{background:#FEE2E2;color:#991B1B;}
.toggle-btn.activate{background:#D1FAE5;color:#065F46;}

/* インライン編集エリア */
.edit-panel{
  display:none;background:#EEF2FF;border:2px solid #1E2761;
  border-radius:8px;padding:16px;margin-bottom:16px;
}
.edit-panel.show{display:block;}
.edit-panel-title{font-size:13px;font-weight:bold;color:#1E2761;margin-bottom:12px;}
.form-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.form-row label{font-size:11px;font-weight:bold;color:#475569;min-width:100px;}
.form-row input,.form-row select{
  padding:7px 10px;border:1px solid #CBD5E1;border-radius:5px;
  font-size:12px;outline:none;min-width:200px;
  font-family:'Meiryo','Yu Gothic',sans-serif;
}
.form-row input:focus,.form-row select:focus{border-color:#028090;}
.panel-btns{display:flex;gap:8px;margin-top:12px;}
.save-btn{padding:8px 22px;background:#1E2761;color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;}
.save-btn:hover{background:#028090;}
.cancel-btn{padding:8px 18px;background:#fff;color:#475569;border:1px solid #CBD5E1;border-radius:5px;font-size:12px;cursor:pointer;}
.msg{padding:8px 14px;border-radius:5px;margin-bottom:10px;font-size:12px;display:none;}
.msg.success{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;}
.msg.error{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;}
.required{color:#DC2626;}
</style>
</head>
<body>
<div class="wrap">
<div class="nav-row">
  <button type="button" class="nbtn" onclick="location.href='index.html'">メニュー</button>
  <button type="button" class="nbtn" onclick="location.href='daily.html'">日報入力</button>
  <button type="button" class="nbtn logout" onclick="handleLogout()">🏠 ログアウト</button>
</div>
<div class="nav-row">
  <button type="button" class="nbtn master" onclick="location.href='dept_master.html'">部門マスタ</button>
  <button type="button" class="nbtn master active">エリア／課マスタ</button>
  <button type="button" class="nbtn master" onclick="location.href='group_master.html'">グループマスタ</button>
  <button type="button" class="nbtn master" onclick="location.href='team_master.html'">チームマスタ</button>
  <button type="button" class="nbtn master" onclick="location.href='store_master.html'">店舗マスタ</button>
  <button type="button" class="nbtn master" onclick="location.href='user_master.html'">ユーザーマスタ</button>
  <button type="button" class="nbtn master" onclick="location.href='rank_master.html'">職制・クラスタマスタ</button>
</div>

<div class="main">
  <div class="page-title">🗾 エリア／課マスタ</div>
  <div class="msg" id="msg"></div>

  <!-- 追加・編集パネル（インライン） -->
  <div class="edit-panel" id="edit-panel">
    <div class="edit-panel-title" id="panel-title">新規追加</div>
    <input type="hidden" id="edit-id">

    <div class="form-row">
      <label>コード <span class="required">*</span></label>
      <input type="text" id="f-code" placeholder="例：A001" maxlength="20">
    </div>
    <div class="form-row">
      <label>エリア／課名 <span class="required">*</span></label>
      <input type="text" id="f-name" placeholder="例：関東エリア" maxlength="100">
    </div>
    <div class="form-row">
      <label>所属部門 <span class="required">*</span></label>
      <select id="f-dept">
        <option value="">-- 部門を選択 --</option>
      </select>
    </div>
    <div class="form-row">
      <label>表示順</label>
      <input type="number" id="f-sort" placeholder="例：1" min="0" style="min-width:80px;">
    </div>
    <div class="panel-btns">
      <button type="button" class="save-btn" onclick="saveData()">💾 保存</button>
      <button type="button" class="cancel-btn" onclick="closePanel()">キャンセル</button>
    </div>
  </div>

  <button type="button" class="add-btn" onclick="openAdd()">＋ 新規エリア／課追加</button>

  <table>
    <thead>
      <tr>
        <th>コード</th>
        <th>エリア／課名</th>
        <th>所属部門</th>
        <th>表示順</th>
        <th>状態</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="list">
      <tr><td colspan="6" style="text-align:center;padding:20px;color:#94A3B8;">読み込み中...</td></tr>
    </tbody>
  </table>
</div>

<script>
const SUPABASE_URL='https://fvkssslpmjtykxoulfmf.supabase.co';
const SUPABASE_KEY='sb_publishable_cE7_r5efkdwSM7YM_8qZmw_6Cxrwfpk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let deptList=[];

function showMsg(text,type='success'){
  const el=document.getElementById('msg');
  el.textContent=text;el.className='msg '+type;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},3000);
}

// 部門一覧をセレクトに設定
function setDeptOptions(selectedId){
  const sel=document.getElementById('f-dept');
  sel.innerHTML='<option value="">-- 部門を選択 --</option>';
  deptList.forEach(d=>{
    const o=document.createElement('option');
    o.value=String(d.id);
    o.textContent=d.code+'：'+d.name;
    if(String(d.id)===String(selectedId)) o.selected=true;
    sel.appendChild(o);
  });
}

// 部門読み込み
async function loadDepts(){
  const res=await fetch(SUPABASE_URL+'/rest/v1/departments?is_active=eq.true&order=sort_order',{
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
  deptList=await res.json()||[];
}

// 一覧読み込み
async function loadData(){
  const res=await fetch(SUPABASE_URL+'/rest/v1/areas?select=*,departments(code,name)&order=sort_order',{
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
  const data=await res.json();
  const error=!res.ok?data:null;
  if(error){showMsg('読み込みエラー','error');return;}
  const tbody=document.getElementById('list');
  if(!data||data.length===0){
    tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:20px;color:#94A3B8;">データがありません</td></tr>';
    return;
  }
  tbody.innerHTML=data.map(d=>`
    <tr>
      <td><strong>${d.code}</strong></td>
      <td>${d.name}</td>
      <td>${d.departments?d.departments.code+'：'+d.departments.name:'－'}</td>
      <td style="text-align:center;">${d.sort_order}</td>
      <td style="text-align:center;">
        <span class="${d.is_active?'badge-active':'badge-inactive'}">${d.is_active?'有効':'無効'}</span>
      </td>
      <td>
        <button type="button" class="edit-btn" onclick="openEdit(${d.id},'${d.code}','${d.name}',${d.department_id||0},${d.sort_order})">編集</button>
        <button type="button" class="toggle-btn ${d.is_active?'deactivate':'activate'}" onclick="toggleActive(${d.id},${d.is_active})">${d.is_active?'無効化':'有効化'}</button>
      </td>
    </tr>
  `).join('');
}

// 新規追加パネルを開く
function openAdd(){
  document.getElementById('panel-title').textContent='新規エリア／課追加';
  document.getElementById('edit-id').value='';
  document.getElementById('f-code').value='';
  document.getElementById('f-code').disabled=false;
  document.getElementById('f-name').value='';
  document.getElementById('f-sort').value='';
  setDeptOptions('');
  document.getElementById('edit-panel').classList.add('show');
  document.getElementById('f-code').focus();
}

// 編集パネルを開く（データはHTMLから直接受け取る）
function openEdit(id,code,name,deptId,sort){
  document.getElementById('panel-title').textContent='エリア／課編集';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-code').value=code;
  document.getElementById('f-code').disabled=true;
  document.getElementById('f-name').value=name;
  document.getElementById('f-sort').value=sort;
  setDeptOptions(deptId);
  document.getElementById('edit-panel').classList.add('show');
  document.getElementById('f-name').focus();
  // 画面上部にスクロール
  document.getElementById('edit-panel').scrollIntoView({behavior:'smooth'});
}

function closePanel(){
  document.getElementById('edit-panel').classList.remove('show');
}

// 保存（fetch直接呼び出し）
async function saveData(){
  const id=document.getElementById('edit-id').value;
  const code=document.getElementById('f-code').value.trim();
  const name=document.getElementById('f-name').value.trim();
  const deptSel=document.getElementById('f-dept');
  const department_id=deptSel.value||null;
  const sort=parseInt(document.getElementById('f-sort').value)||0;

  if(!code){alert('コードを入力してください。');return;}
  if(!name){alert('名称を入力してください。');return;}
  if(!department_id){alert('部門を選択してください。');return;}

  const payload={name,department_id:parseInt(department_id),sort_order:sort,updated_at:new Date().toISOString()};

  try{
    let url,method,body;
    if(id){
      // 更新
      url=SUPABASE_URL+'/rest/v1/areas?id=eq.'+id;
      method='PATCH';
      body=JSON.stringify(payload);
    } else {
      // 新規
      url=SUPABASE_URL+'/rest/v1/areas';
      method='POST';
      body=JSON.stringify({code,...payload,is_active:true});
    }

    const res=await fetch(url,{
      method,
      headers:{
        'Content-Type':'application/json',
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,
        'Prefer':'return=minimal'
      },
      body
    });

    if(!res.ok){
      const err=await res.text();
      showMsg('保存エラー：'+err,'error');
      return;
    }

    closePanel();
    showMsg(id?'エリア／課情報を更新しました':'新しいエリア／課を追加しました');
    // 少し待ってから再読み込み
    setTimeout(async()=>{ await loadData(); }, 300);

  } catch(e){
    showMsg('通信エラー：'+e.message,'error');
  }
}

// 有効・無効切り替え
async function toggleActive(id,current){
  if(!confirm(current?'無効化しますか？':'有効化しますか？'))return;
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/areas?id=eq.'+id,{
      method:'PATCH',
      headers:{
        'Content-Type':'application/json',
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,
        'Prefer':'return=minimal'
      },
      body:JSON.stringify({is_active:!current})
    });
    if(!res.ok){const err=await res.text();showMsg('更新エラー：'+err,'error');return;}
    showMsg(current?'無効化しました':'有効化しました');
    loadData();
  }catch(e){showMsg('通信エラー：'+e.message,'error');}
}

function handleLogout(){
  if(confirm('ログアウトしますか？')){localStorage.clear();window.location.href='login.html';}
}

// 初期化
async function init(){
  await loadDepts();
  await loadData();
}
init();
</script>
</body>
</html>
