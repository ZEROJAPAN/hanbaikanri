async function apiFetch(path){
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
  return await res.json();
}
async function apiFetchAll(pathBase){
  let all=[],offset=0;const pageSize=1000;
  while(true){
    const sep=pathBase.includes('?')?'&':'?';
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${pathBase}${sep}limit=${pageSize}&offset=${offset}`,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const page=await res.json();
    if(!Array.isArray(page))throw new Error(JSON.stringify(page));
    all=all.concat(page);
    if(page.length<pageSize)break;
    offset+=pageSize;
  }
  return all;
}

async function loadMasters(){
  [CATS, CHANNELS, VISIT_REASONS]=await Promise.all([
    apiFetch('product_categories?order=sort_order&select=id,name,sort_order'),
    apiFetch('channels?order=sort_order&select=id,name,sort_order'),
    apiFetch('visit_reasons?order=sort_order&select=id,name,sort_order'),
  ]);
  const buyCh=CHANNELS.find(c=>c.name==='買取');
  const cancelCh=CHANNELS.find(c=>c.name==='キャンセル');
  BUY_CHID=buyCh?buyCh.id:1;
  CANCEL_CHID=cancelCh?cancelCh.id:2;

  const [stores, teams, groups, areas, departments]=await Promise.all([
    apiFetch('stores?is_active=eq.true&order=sort_order&select=id,name,sort_order,team_id,code'),
    apiFetch('teams?is_active=eq.true&order=sort_order&select=id,name,sort_order,group_id'),
    apiFetch('groups?is_active=eq.true&order=sort_order&select=id,name,sort_order,area_id'),
    apiFetch('areas?is_active=eq.true&order=sort_order&select=id,name,sort_order,department_id'),
    apiFetch('departments?is_active=eq.true&order=sort_order&select=id,name,sort_order'),
  ]);
  STORES_RAW=stores;
  const productRegenStore=stores.find(s=>String(s.code)==='290');
  PRODUCT_REGEN_STORE_ID=productRegenStore?productRegenStore.id:null;

  const cols=[];
  const allStoreIds=[];
  const unassignedStores=stores.filter(s=>!s.team_id);
  const usedStoreIds=new Set();

  for(const dept of departments){
    const deptAreas=areas.filter(a=>a.department_id===dept.id);
    const deptStoreIds=[];
    for(const area of deptAreas){
      const areaGroups=groups.filter(g=>g.area_id===area.id);
      const areaStoreIds=[];
      for(const group of areaGroups){
        const groupTeams=teams.filter(t=>t.group_id===group.id);
        const groupStoreIds=[];
        for(const team of groupTeams){
          const teamStores=stores.filter(s=>s.team_id===team.id);
          const teamStoreIds=teamStores.map(s=>s.id);
          teamStores.forEach(s=>{cols.push({type:'store',id:s.id,name:s.name,storeIds:[s.id]});usedStoreIds.add(s.id);});
          if(teamStores.length>1)cols.push({type:'team_total',name:team.name+' 計',storeIds:teamStoreIds});
          groupStoreIds.push(...teamStoreIds);
        }
        if(groupTeams.length>1)cols.push({type:'group_total',name:group.name+' 計',storeIds:groupStoreIds});
        areaStoreIds.push(...groupStoreIds);
      }
      if(areaGroups.length>1)cols.push({type:'area_total',name:area.name+' 計',storeIds:areaStoreIds});
      deptStoreIds.push(...areaStoreIds);
    }
    if(deptAreas.length>1)cols.push({type:'dept_total',name:dept.name+' 計',storeIds:deptStoreIds});
    allStoreIds.push(...deptStoreIds);
  }
  unassignedStores.forEach(s=>{
    if(!usedStoreIds.has(s.id)){cols.push({type:'store',id:s.id,name:s.name,storeIds:[s.id]});allStoreIds.push(s.id);}
  });

  cols.push({type:'grand_total',name:'総合計',storeIds:[...new Set(allStoreIds)]});
  ORG_COLUMNS=cols;

  // 階層が実際に機能しているかの簡易診断
  const hierarchyDiag={
    departments: departments.length,
    areas: areas.length,
    groups: groups.length,
    teams: teams.length,
    storesWithTeam: stores.filter(s=>s.team_id).length,
    storesTotal: stores.length,
    subtotalColumns: cols.filter(c=>c.type!=='store'&&c.type!=='grand_total').length,
  };
  window.__hierarchyDiag=hierarchyDiag;
}

async function loadReport(){
  const from=document.getElementById('dateFrom').value;
  const to=document.getElementById('dateTo').value;
  const taxMode=document.getElementById('taxMode').value;
  const statusEl=document.getElementById('status');
  if(!from||!to){statusEl.textContent='開始日・終了日を指定してください。';return;}
  statusEl.textContent='集計中...';
  document.getElementById('btnLoad').disabled=true;

  try{
    if(CATS.length===0) await loadMasters();

    const [dailyRows, purchaseRows, goldSettlementRows]=await Promise.all([
      apiFetchAll(`daily_reports?report_date=gte.${from}&report_date=lte.${to}&select=store_id,category_id,channel_id,quantity,amount&order=id`),
      apiFetchAll(`purchase_details?report_date=gte.${from}&report_date=lte.${to}&select=store_id,report_date,visit_reason_id,visitors,amount,first_visit,repeat_visit,no_purchase,cancel_count&order=id`),
      apiFetchAll(`gold_recovery_settlement?settlement_date=gte.${from}&settlement_date=lte.${to}&select=store_id,amount&order=id`),
    ]);

    const catMap={}; CATS.forEach(c=>catMap[c.id]=c.name);
    const chMap={}; CHANNELS.forEach(c=>chMap[c.id]=c.name);

    const ecGrouped={}; // "catName|chName" -> {storeId:{qty, amounts:[各日の税込金額,...]}}
    const buyByCatStore={}; // catId -> {storeId:{qty, amounts:[...]}}
    const cancelAmountByStore={};

    for(const row of dailyRows){
      if(row.channel_id===BUY_CHID){
        if(!buyByCatStore[row.category_id])buyByCatStore[row.category_id]={};
        if(!buyByCatStore[row.category_id][row.store_id])buyByCatStore[row.category_id][row.store_id]={qty:0,amounts:[]};
        buyByCatStore[row.category_id][row.store_id].qty+=row.quantity||0;
        buyByCatStore[row.category_id][row.store_id].amounts.push(row.amount||0);
      } else if(row.channel_id===CANCEL_CHID){
        cancelAmountByStore[row.store_id]=(cancelAmountByStore[row.store_id]||0)+(row.amount||0);
      } else {
        const catName=catMap[row.category_id]; const chName=chMap[row.channel_id];
        if(!catName||!chName)continue;
        const key=catName+'|'+chName;
        if(!ecGrouped[key])ecGrouped[key]={catName,chName,exempt:isTaxExemptCategory(catName)||isTaxExemptChannel(chName),stores:{}};
        const g=ecGrouped[key];
        if(!g.stores[row.store_id])g.stores[row.store_id]={qty:0,amounts:[]};
        g.stores[row.store_id].qty+=row.quantity||0;
        g.stores[row.store_id].amounts.push(row.amount||0);
      }
    }

    const seenStoreDate=new Set();
    const firstVisitByStore={}, repeatVisitByStore={}, noPurchaseByStore={}, cancelCountByStore={};
    const visitorsByReasonStore={};

    for(const row of purchaseRows){
      const dedupKey=row.store_id+'|'+row.report_date;
      if(!seenStoreDate.has(dedupKey)){
        seenStoreDate.add(dedupKey);
        firstVisitByStore[row.store_id]=(firstVisitByStore[row.store_id]||0)+(row.first_visit||0);
        repeatVisitByStore[row.store_id]=(repeatVisitByStore[row.store_id]||0)+(row.repeat_visit||0);
        noPurchaseByStore[row.store_id]=(noPurchaseByStore[row.store_id]||0)+(row.no_purchase||0);
        cancelCountByStore[row.store_id]=(cancelCountByStore[row.store_id]||0)+(row.cancel_count||0);
      }
      if(!visitorsByReasonStore[row.visit_reason_id])visitorsByReasonStore[row.visit_reason_id]={};
      visitorsByReasonStore[row.visit_reason_id][row.store_id]=(visitorsByReasonStore[row.visit_reason_id][row.store_id]||0)+(row.visitors||0);
    }

    // 貴金属　売上（gold_recovery_settlement）：店舗ごとに日別金額配列を保持、商品再生課はマイナス合計
    const preciousMetalAmountsByStore={};
    goldSettlementRows.forEach(row=>{
      if(!preciousMetalAmountsByStore[row.store_id])preciousMetalAmountsByStore[row.store_id]=[];
      preciousMetalAmountsByStore[row.store_id].push(row.amount||0);
    });
    if(PRODUCT_REGEN_STORE_ID){
      const totalAllStores=goldSettlementRows.reduce((s,r)=>s+(r.amount||0),0);
      // 商品再生課自身の実績（通常は無いはずだが、念のため既存分に追加する形にする）
      if(!preciousMetalAmountsByStore[PRODUCT_REGEN_STORE_ID])preciousMetalAmountsByStore[PRODUCT_REGEN_STORE_ID]=[];
      preciousMetalAmountsByStore[PRODUCT_REGEN_STORE_ID].push(-totalAllStores);
    }

    lastReportData={taxMode, ecGrouped, buyByCatStore, cancelAmountByStore, firstVisitByStore, repeatVisitByStore, noPurchaseByStore, cancelCountByStore, visitorsByReasonStore, preciousMetalAmountsByStore, from, to};

    renderTable();
    let msg=`✅ ${from}〜${to}：daily_reports ${dailyRows.length.toLocaleString()}行 / purchase_details ${purchaseRows.length.toLocaleString()}行 を集計しました`;
    const hd=window.__hierarchyDiag;
    if(hd){
      msg+=`\n📊 組織階層：部門${hd.departments}件・エリア${hd.areas}件・グループ${hd.groups}件・チーム${hd.teams}件／店舗${hd.storesWithTeam}/${hd.storesTotal}件がチームに所属／小計列${hd.subtotalColumns}個`;
      if(hd.subtotalColumns===0){
        msg+=`\n⚠ 小計列が0個です。store_master.htmlで店舗にチームを割り当て、team_master.html等でチーム→グループ→エリア→部門の階層を登録してください。`;
      }
    }
    statusEl.textContent=msg;
  }catch(e){
    statusEl.textContent='❌ エラー: '+e.message;
  }finally{
    document.getElementById('btnLoad').disabled=false;
  }
}

function colClass(col){
  if(col.type==='team_total')return 'col-team';
  if(col.type==='group_total')return 'col-group';
  if(col.type==='area_total')return 'col-area';
  if(col.type==='dept_total')return 'col-dept';
  if(col.type==='grand_total')return 'col-grand';
  return '';
}

function sumForCols(dataByStore, col){
  let qty=0, amount=0;
  col.storeIds.forEach(id=>{const d=dataByStore[id];if(d){qty+=d.qty||0;amount+=d.amount||0;}});
  return {qty,amount};
}
function sumSimpleForCols(dataByStore, col){
  let v=0;
  col.storeIds.forEach(id=>{v+=dataByStore[id]||0;});
  return v;
}

function renderTable(){
  const d=lastReportData;
  const taxMode=document.getElementById('taxMode').value; // 常に現在の選択値を参照（再取得不要で即時反映）
  const table=document.getElementById('reportTable');

  let headHtml='<tr><th style="min-width:260px;">カテゴリー / チャンネル</th>';
  ORG_COLUMNS.forEach(c=>{headHtml+=`<th colspan="2" class="${c.type!=='store'?'total-col '+colClass(c):''}">${c.name}</th>`;});
  headHtml+='</tr><tr><th class="hdr-row2"></th>';
  ORG_COLUMNS.forEach(()=>{headHtml+='<th class="hdr-row2">点数</th><th class="hdr-row2">金額</th>';});
  headHtml+='</tr>';
  table.querySelector('thead').innerHTML=headHtml;

  // 2段ヘッダーが重ならないよう、1段目の実測高さを CSS変数に反映
  requestAnimationFrame(()=>{
    const row1=table.querySelector('thead tr:first-child');
    if(row1){table.style.setProperty('--hdr1-h', row1.offsetHeight+'px');}
  });

  let bodyHtml='';

  function ecCellRow(label, dataByStoreFn, extraClass=''){
    let html=`<tr class="${extraClass}"><td class="rowlabel">${label}</td>`;
    ORG_COLUMNS.forEach(col=>{
      const {qty,amount}=dataByStoreFn(col);
      html+=`<td class="num ${col.type!=='store'?'total-col '+colClass(col):''}">${fmt(qty)}</td><td class="num ${col.type!=='store'?'total-col '+colClass(col):''}">${fmt(amount)}</td>`;
    });
    html+='</tr>';
    return html;
  }
  function simpleCellRow(label, dataByStore, extraClass=''){
    let html=`<tr class="${extraClass}"><td class="rowlabel">${label}</td>`;
    ORG_COLUMNS.forEach(col=>{
      const v=sumSimpleForCols(dataByStore, col);
      html+=`<td class="num ${col.type!=='store'?'total-col '+colClass(col):''}" colspan="2">${fmt(v)}</td>`;
    });
    html+='</tr>';
    return html;
  }
  function zeroRow(label){
    let html=`<tr class="zero-row"><td class="rowlabel">${label}</td>`;
    ORG_COLUMNS.forEach(c=>{html+=`<td class="num total-col ${colClass(c)}" colspan="2">0</td>`;});
    html+='</tr>';
    return html;
  }

  const ecTotalByStore={};

  function roundedSumOfAmounts(amounts, exempt, taxMode){
    return amounts.reduce((s,a)=>s+Math.ceil(taxAdjust(a, exempt, taxMode)), 0);
  }

  EC_SECTIONS.forEach(section=>{
    const catAcc={};
    const exemptCat=isTaxExemptCategory(section.cat);
    section.channels.forEach(chLabel=>{
      const chName=CHANNEL_LABEL_MAP[chLabel]||chLabel;
      const key=section.cat+'|'+chName;
      const g=d.ecGrouped[key];
      const storesRaw=g?g.stores:{};
      const exempt=exemptCat||isTaxExemptChannel(chName);
      const rowData={};
      Object.entries(storesRaw).forEach(([sid,v])=>{
        const adjAmount=roundedSumOfAmounts(v.amounts, exempt, taxMode); // 日ごとに税抜換算→四捨五入してから合計
        rowData[sid]={qty:v.qty, amount:adjAmount};
        if(!catAcc[sid])catAcc[sid]={qty:0,amount:0};
        catAcc[sid].qty+=v.qty; catAcc[sid].amount+=adjAmount;
        if(!ecTotalByStore[sid])ecTotalByStore[sid]={qty:0,amount:0};
        ecTotalByStore[sid].qty+=v.qty; ecTotalByStore[sid].amount+=adjAmount;
      });
      bodyHtml+=ecCellRow(section.cat+' '+chLabel, col=>sumForCols(rowData, col));
    });
    bodyHtml+=ecCellRow(section.cat+' 合計', col=>sumForCols(catAcc, col), 'cattotal');
  });

  ZERO_ROWS_A.forEach(label=>{
    if(label==='貴金属　売上'){
      const rowData={};
      Object.keys(d.preciousMetalAmountsByStore).forEach(sid=>{
        const arr=d.preciousMetalAmountsByStore[sid];
        const amount=roundedSumOfAmounts(arr, false, taxMode); // 課税対象（テレカ金券・免税ではない）
        rowData[sid]={qty:0, amount};
        if(!ecTotalByStore[sid])ecTotalByStore[sid]={qty:0,amount:0};
        ecTotalByStore[sid].amount+=amount; // 総売上・総合計に反映（商品再生課のマイナス分で相殺される）
      });
      bodyHtml+=ecCellRow(label, col=>sumForCols(rowData, col));
    } else {
      bodyHtml+=zeroRow(label);
    }
  });

  bodyHtml+=ecCellRow('総売上', col=>sumForCols(ecTotalByStore, col), 'sectiontotal');
  bodyHtml+=ecCellRow('客数・売上合計', col=>sumForCols(ecTotalByStore, col), 'sectiontotal');

  const buyTotalByStore={};
  BUY_CATEGORY_IDS.forEach(catId=>{
    const catName=(CATS.find(c=>c.id===catId)||{}).name||`カテゴリーID${catId}`;
    const exempt=isTaxExemptCategory(catName);
    const rawByStore=d.buyByCatStore[catId]||{};
    const adjByStore={};
    Object.entries(rawByStore).forEach(([sid,v])=>{
      const adjAmount=roundedSumOfAmounts(v.amounts, exempt, taxMode);
      adjByStore[sid]={qty:v.qty, amount:adjAmount};
      if(!buyTotalByStore[sid])buyTotalByStore[sid]={qty:0,amount:0};
      buyTotalByStore[sid].qty+=v.qty; buyTotalByStore[sid].amount+=adjAmount;
    });
    bodyHtml+=ecCellRow(catName, col=>sumForCols(adjByStore, col));
  });

  ZERO_ROWS_B.forEach(label=>{bodyHtml+=zeroRow(label);});

  bodyHtml+=ecCellRow('仕入れ合計', col=>sumForCols(buyTotalByStore, col), 'sectiontotal');

  const lastCol=ORG_COLUMNS[ORG_COLUMNS.length-1];
  const ecTotalGrand=sumForCols(ecTotalByStore, lastCol);
  const buyTotalGrand=sumForCols(buyTotalByStore, lastCol);

  bodyHtml+=simpleCellRow('初めて', d.firstVisitByStore);
  bodyHtml+=simpleCellRow('２回目', d.repeatVisitByStore);
  const ankeCombined={};
  Object.keys({...d.firstVisitByStore, ...d.repeatVisitByStore}).forEach(sid=>{
    ankeCombined[sid]=(d.firstVisitByStore[sid]||0)+(d.repeatVisitByStore[sid]||0);
  });
  bodyHtml+=simpleCellRow('アンケート計', ankeCombined, 'sectiontotal');

  const ankeTotal=sumSimpleForCols(ankeCombined, lastCol);
  const custUnitPrice=ecTotalGrand.amount>0 ? (buyTotalGrand.amount/ecTotalGrand.amount) : 0;
  const costRate=ankeTotal>0 ? (buyTotalGrand.amount/ankeTotal) : 0;

  bodyHtml+=`<tr><td class="rowlabel">１客単価（仕入合計÷総売上）</td><td class="num" colspan="${ORG_COLUMNS.length*2}">${custUnitPrice.toFixed(3)}</td></tr>`;
  bodyHtml+=`<tr><td class="rowlabel">原価率（仕入合計÷アンケート計）</td><td class="num" colspan="${ORG_COLUMNS.length*2}">${fmt(costRate)}</td></tr>`;

  let reasonTotalByStore={};
  VISIT_REASONS.forEach(vr=>{
    const dataByStore=d.visitorsByReasonStore[vr.id]||{};
    Object.entries(dataByStore).forEach(([sid,v])=>{reasonTotalByStore[sid]=(reasonTotalByStore[sid]||0)+v;});
    bodyHtml+=simpleCellRow(vr.name, dataByStore);
  });
  bodyHtml+=simpleCellRow('項目別合計', reasonTotalByStore, 'sectiontotal');

  bodyHtml+=simpleCellRow('買取不可', d.noPurchaseByStore);
  bodyHtml+=simpleCellRow('キャンセル件数', d.cancelCountByStore);
  bodyHtml+=ecCellRow('キャンセル金額', col=>{const amt=sumSimpleForCols(d.cancelAmountByStore,col);return{qty:0,amount:amt};});

  const repeatTotal=sumSimpleForCols(d.repeatVisitByStore, lastCol);
  const repeatRate=ankeTotal>0?(repeatTotal/ankeTotal):0;
  bodyHtml+=`<tr><td class="rowlabel">リピーター率</td><td class="num" colspan="${ORG_COLUMNS.length*2}">${fmtPct(repeatRate)}</td></tr>`;

  table.querySelector('tbody').innerHTML=bodyHtml;

  document.getElementById('summaryBar').innerHTML=`
    <div class="sum-card"><div class="sum-card-title">総売上（${taxMode==='incl'?'税込':'税抜'}）</div><div class="sum-card-value">¥${fmt(ecTotalGrand.amount)}</div></div>
    <div class="sum-card"><div class="sum-card-title">買取（仕入合計）</div><div class="sum-card-value">¥${fmt(buyTotalGrand.amount)}</div></div>
    <div class="sum-card"><div class="sum-card-title">アンケート計（初めて＋2回目）</div><div class="sum-card-value">${fmt(ankeTotal)}</div></div>
    <div class="sum-card"><div class="sum-card-title">リピーター率</div><div class="sum-card-value">${fmtPct(repeatRate)}</div></div>
  `;
}

function rgbToArgb(rgbStr){
  const m=rgbStr.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
  if(!m)return null;
  const alpha=m[4]!==undefined?parseFloat(m[4]):1;
  if(alpha===0)return null; // 透明は塗りつぶさない
  const hex=n=>Number(n).toString(16).padStart(2,'0').toUpperCase();
  return 'FF'+hex(m[1])+hex(m[2])+hex(m[3]);
}

async function exportExcel(){
  if(!lastReportData){alert('先に集計してください。');return;}
  const wb=new ExcelJS.Workbook();
  const ws=wb.addWorksheet('月報');
  const table=document.getElementById('reportTable');
  const rows=table.querySelectorAll('tr');
  const thin={style:'thin',color:{argb:'FF000000'}};
  const border={top:thin,bottom:thin,left:thin,right:thin};

  rows.forEach((tr,ri)=>{
    const cells=tr.querySelectorAll('th,td');
    const rowData=[];
    const cellMeta=[]; // {colspanStart, colspan, argb, isHeader}
    let colIdx=1;
    cells.forEach(cell=>{
      const colspan=parseInt(cell.getAttribute('colspan')||'1');
      const text=cell.textContent.trim();
      const num=Number(text.replace(/[,%]/g,''));
      const isNumericCell=!isNaN(num)&&text!==''&&cell.tagName==='TD';
      rowData.push(isNumericCell?num:text);
      const bg=getComputedStyle(cell).backgroundColor;
      const argb=rgbToArgb(bg);
      cellMeta.push({col:colIdx, colspan, argb, isHeader:cell.tagName==='TH'});
      for(let i=1;i<colspan;i++){rowData.push('');}
      colIdx+=colspan;
    });
    const row=ws.addRow(rowData);
    row.eachCell((cell,colNumber)=>{
      cell.border=border;
      cell.font={size:9};
      if(typeof cell.value==='number')cell.numFmt='#,##0';
    });
    // 背景色とヘッダーの文字色・結合を適用
    cellMeta.forEach(meta=>{
      const cell=row.getCell(meta.col);
      if(meta.argb)cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:meta.argb}};
      if(meta.isHeader){
        cell.font={color:{argb:'FFFFFFFF'},bold:true,size:9};
        cell.alignment={horizontal:'center',vertical:'middle'};
      }
      if(meta.colspan>1){
        ws.mergeCells(ri+1, meta.col, ri+1, meta.col+meta.colspan-1);
      }
    });
  });
  ws.getColumn(1).width=32;

  const from=document.getElementById('dateFrom').value;
  const to=document.getElementById('dateTo').value;
  const taxMode=document.getElementById('taxMode').value;
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`売上月次報告書_${taxMode==='incl'?'税込':'税抜'}_${from}_${to}.xlsx`;
  a.click();
  URL.revokeObjectURL(url);
}

function handleLogout(){
  if(confirm('ログアウトしますか？')){localStorage.clear();window.location.href='login.html';}
}
