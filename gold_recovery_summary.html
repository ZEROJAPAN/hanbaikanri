<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地金換金 全店計上 - ゼロジャパン</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
:root{
  --blue:#2563eb; --blue-dark:#1d4ed8; --bg:#f4f6f9; --card:#ffffff;
  --border:#dbe1e8; --text:#1f2937; --muted:#6b7280; --green:#16a34a; --red:#dc2626;
}
*{box-sizing:border-box;}
body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;background:var(--bg);color:var(--text);}
header{background:#1E2761;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:16px;margin:0;}
header a{color:#fff;text-decoration:none;font-size:13px;opacity:.85;}
main{max-width:1100px;margin:20px auto;padding:0 16px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:18px;}
.card h2{font-size:15px;margin:0 0 12px;color:var(--blue-dark);}
.row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;}
.btn{padding:9px 18px;border:none;border-radius:6px;background:var(--blue);color:#fff;font-size:14px;cursor:pointer;font-weight:600;}
.btn:hover{background:var(--blue-dark);}
.btn:disabled{background:#9ca3af;cursor:not-allowed;}
.btn.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue);}
.btn.confirm{background:linear-gradient(180deg,#0FAA7A,#028090);box-shadow:0 3px 0 #015060;}
.date-input{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;}
.status{margin-top:10px;font-size:13px;white-space:pre-wrap;}
.status.ok{color:var(--green);}
.status.err{color:var(--red);}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px;}
.summary-grid .box{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.summary-grid .box .num{font-size:20px;font-weight:700;color:var(--blue-dark);}
.summary-grid .box .cap{font-size:11px;color:var(--muted);}
.store-block{margin-bottom:18px;}
.store-block h3{font-size:14px;margin:0 0 6px;padding-bottom:4px;border-bottom:2px solid var(--blue);display:flex;justify-content:space-between;align-items:center;}
.store-block h3 .store-amount{font-size:13px;color:var(--blue-dark);}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px;}
th,td{border:1px solid var(--border);padding:5px 8px;text-align:right;}
th{background:#eef2f7;text-align:center;white-space:nowrap;}
td.label{text-align:left;font-weight:600;background:#fafbfc;white-space:nowrap;}
td.editable input{width:90px;text-align:right;border:1.5px solid #F59E0B;border-radius:4px;padding:3px 5px;background:#FFFBEB;outline:none;}
.muted{color:var(--muted);font-size:12px;}
.warn-box{background:#fff7ed;border:1px solid #fdba74;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#9a3412;}
</style>
</head>
<body>

<header>
  <h1>💰 地金換金 全店計上</h1>
  <a href="index.html">← メニューに戻る</a>
</header>

<main>

  <div class="card">
    <h2>計上日</h2>
    <div class="row">
      <input type="date" class="date-input" id="settleDate">
      <button class="btn secondary" type="button" id="btnLoad">未計上データを読込</button>
      <button class="btn secondary" type="button" id="btnExport">📋 未計上チェック表 Excel出力</button>
    </div>
    <p class="muted" style="margin-top:8px;">
      各店舗の回収日にかかわらず、まだ計上されていない（settled_at未設定の）回収グラム数をすべて集計し、この計上日のレートを適用します。
    </p>
    <div id="status" class="status"></div>
  </div>

  <div class="card" id="warnCard" style="display:none;"><div class="warn-box" id="warnBox"></div></div>

  <div class="card" id="summaryCard" style="display:none;">
    <h2>全店合計プレビュー</h2>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="row">
      <button class="btn confirm" type="button" id="btnConfirm">✅ 全店計上を確定する</button>
      <span class="muted" id="confirmStatus"></span>
    </div>
    <p class="muted" style="margin-top:8px;">
      ※ 確定すると、対象となった回収データはすべて「計上済み」としてマークされ、次回の計上では対象外になります（取り消しはできません。実行前に内容をよくご確認ください）。
    </p>
  </div>

  <div id="storeResults"></div>

</main>

<script>
const SUPABASE_URL='https://fvkssslpmjtykxoulfmf.supabase.co';
const SUPABASE_KEY='sb_publishable_cE7_r5efkdwSM7YM_8qZmw_6Cxrwfpk';

async function apiFetch(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}};
  if(body){opts.headers['Content-Type']='application/json';opts.headers['Prefer']='return=minimal';opts.body=JSON.stringify(body);}
  return await fetch(SUPABASE_URL+'/rest/v1/'+path,opts);
}
async function apiFetchAll(pathBase){
  let all=[],offset=0;const pageSize=1000;
  while(true){
    const sep=pathBase.includes('?')?'&':'?';
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${pathBase}${sep}limit=${pageSize}&offset=${offset}`,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const page=await res.json();
    if(!Array.isArray(page))throw new Error(JSON.stringify(page));
    all=all.concat(page);
    if(page.length<pageSize)break;
    offset+=pageSize;
  }
  return all;
}
function fmt(n){return Math.round(n||0).toLocaleString('ja-JP');}
function todayStr(){return new Date().toISOString().slice(0,10);}
document.getElementById('settleDate').value=todayStr();

let STORES=[], PMT_ID_TO_NAME={}, PMT_NAME_TO_ID={};
let pendingRowIds=[];
let aggregated=null;

async function loadMasters(){
  STORES=await apiFetchAll('stores?is_active=eq.true&order=sort_order&select=id,name');
  const pmt=await apiFetchAll('precious_metal_types?select=id,name');
  pmt.forEach(p=>{PMT_ID_TO_NAME[p.id]=p.name; PMT_NAME_TO_ID[p.name]=p.id;});
}

document.getElementById('btnLoad').onclick=loadPending;
document.getElementById('btnConfirm').onclick=confirmSettlement;
document.getElementById('btnExport').onclick=exportChecklist;

async function loadPending(){
  const date=document.getElementById('settleDate').value;
  const statusEl=document.getElementById('status');
  if(!date){statusEl.textContent='計上日を指定してください。';return;}
  statusEl.className='status'; statusEl.textContent='読込中...';
  document.getElementById('summaryCard').style.display='none';
  document.getElementById('warnCard').style.display='none';
  document.getElementById('storeResults').innerHTML='';
  const confirmBtn=document.getElementById('btnConfirm');
  confirmBtn.disabled=false;
  confirmBtn.textContent='✅ 全店計上を確定する';
  document.getElementById('confirmStatus').textContent='';

  try{
    if(STORES.length===0) await loadMasters();

    const pendingRows=await apiFetchAll(`gold_recovery?settled_at=is.null&record_date=lte.${date}&recovery_weight=gt.0&select=id,store_id,metal_type_id,recovery_weight`);
    pendingRowIds=pendingRows.map(r=>r.id);

    const rateRows=await apiFetch(`precious_metal_rates?record_date=eq.${date}&select=metal_type_id,rate`).then(r=>r.json());
    const rateByMetalId={};
    (rateRows||[]).forEach(r=>{rateByMetalId[r.metal_type_id]=r.rate;});

    const byStore={};
    pendingRows.forEach(r=>{
      if(!byStore[r.store_id])byStore[r.store_id]={};
      byStore[r.store_id][r.metal_type_id]=(byStore[r.store_id][r.metal_type_id]||0)+(r.recovery_weight||0);
    });

    const storeList=Object.entries(byStore).map(([storeId,metals])=>{
      const storeName=(STORES.find(s=>String(s.id)===String(storeId))||{}).name||`店舗ID${storeId}`;
      const metalList=Object.entries(metals).map(([metalTypeId,qty])=>({
        metalTypeId:Number(metalTypeId),
        name:PMT_ID_TO_NAME[metalTypeId]||`金種ID${metalTypeId}`,
        qty,
        rate:rateByMetalId[metalTypeId]||0,
      })).sort((a,b)=>a.name.localeCompare(b.name,'ja'));
      return {storeId:Number(storeId), storeName, metals:metalList};
    }).sort((a,b)=>a.storeName.localeCompare(b.storeName,'ja'));

    aggregated={date, stores:storeList};

    const missingRateNames=new Set();
    storeList.forEach(s=>s.metals.forEach(m=>{if(!m.rate)missingRateNames.add(m.name);}));
    const warnCard=document.getElementById('warnCard');
    if(missingRateNames.size>0){
      document.getElementById('warnBox').innerHTML='<strong>⚠ この計上日のレートが未登録の金種があります（金額0で計算されます）</strong>'+[...missingRateNames].join('、');
      warnCard.style.display='block';
    }

    renderStores();
    statusEl.className='status ok';
    statusEl.textContent=`✅ 未計上データ ${pendingRows.length.toLocaleString()}行 / ${storeList.length}店舗分を読み込みました。`;
  }catch(e){
    statusEl.className='status err';
    statusEl.textContent='❌ エラー: '+e.message;
  }
}

function renderStores(){
  const container=document.getElementById('storeResults');
  container.innerHTML='';
  let grandQty=0, grandAmount=0;

  aggregated.stores.forEach(s=>{
    const card=document.createElement('div');
    card.className='card store-block';
    let rowsHtml='';
    let storeAmount=0;
    s.metals.forEach(m=>{
      const amount=Math.round(m.qty*m.rate);
      storeAmount+=amount;
      rowsHtml+=`<tr data-store="${s.storeId}" data-metal="${m.metalTypeId}">
        <td class="label">${m.name}</td>
        <td>${fmt(m.rate)}</td>
        <td>${m.qty.toFixed(1)}g</td>
        <td class="editable"><input type="number" step="0.1" value="${m.qty.toFixed(1)}" class="adj-input" oninput="recalcStore(${s.storeId})"></td>
        <td class="amt-cell">¥${fmt(amount)}</td>
      </tr>`;
    });
    grandQty+=s.metals.reduce((sum,m)=>sum+m.qty,0);
    grandAmount+=storeAmount;

    card.innerHTML=`
      <h3>${s.storeName} <span class="store-amount" id="storeAmt_${s.storeId}">¥${fmt(storeAmount)}</span></h3>
      <table>
        <thead><tr><th>金種</th><th>当日レート</th><th>未計上g数</th><th>現物g数（修正後）</th><th>金額</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    `;
    container.appendChild(card);
  });

  document.getElementById('summaryGrid').innerHTML=`
    <div class="box"><div class="num">${aggregated.stores.length}</div><div class="cap">対象店舗数</div></div>
    <div class="box"><div class="num">${grandQty.toFixed(1)}g</div><div class="cap">未計上g数合計</div></div>
    <div class="box"><div class="num">¥${fmt(grandAmount)}</div><div class="cap">計上金額合計</div></div>
  `;
  document.getElementById('summaryCard').style.display='block';
}

function recalcStore(storeId){
  const s=aggregated.stores.find(x=>x.storeId===storeId);
  let storeAmount=0;
  document.querySelectorAll(`tr[data-store="${storeId}"]`).forEach(tr=>{
    const metalId=Number(tr.getAttribute('data-metal'));
    const m=s.metals.find(x=>x.metalTypeId===metalId);
    const adj=Number(tr.querySelector('.adj-input').value)||0;
    const amount=Math.round(adj*m.rate);
    tr.querySelector('.amt-cell').textContent='¥'+fmt(amount);
    storeAmount+=amount;
  });
  document.getElementById('storeAmt_'+storeId).textContent='¥'+fmt(storeAmount);

  let grandAmount=0;
  aggregated.stores.forEach(st=>{
    const el=document.getElementById('storeAmt_'+st.storeId);
    if(el)grandAmount+=Number(el.textContent.replace(/[¥,]/g,''));
  });
  const grandBox=document.querySelectorAll('#summaryGrid .box .num')[2];
  if(grandBox)grandBox.textContent='¥'+fmt(grandAmount);
}

async function confirmSettlement(){
  if(!aggregated||aggregated.stores.length===0){alert('先に未計上データを読み込んでください。');return;}
  if(!confirm('全店計上を確定します。対象の回収データはすべて計上済みとしてマークされ、元に戻せません。よろしいですか？'))return;

  const btn=document.getElementById('btnConfirm');
  const statusEl=document.getElementById('confirmStatus');
  btn.disabled=true;
  statusEl.textContent='確定中...';

  try{
    const date=aggregated.date;
    const settleRows=[];
    aggregated.stores.forEach(s=>{
      document.querySelectorAll(`tr[data-store="${s.storeId}"]`).forEach(tr=>{
        const metalId=Number(tr.getAttribute('data-metal'));
        const m=s.metals.find(x=>x.metalTypeId===metalId);
        const adj=Number(tr.querySelector('.adj-input').value)||0;
        const amount=Math.round(adj*m.rate);
        settleRows.push({
          settlement_date:date, store_id:s.storeId, metal_type_id:metalId,
          collected_weight:m.qty, adjusted_weight:adj, rate:m.rate, amount,
        });
      });
    });

    const insRes=await apiFetch('gold_recovery_settlement','POST',settleRows);
    if(!insRes.ok)throw new Error('計上データ保存失敗: '+(await insRes.text()));

    const nowIso=new Date().toISOString();
    const CHUNK=200;
    for(let i=0;i<pendingRowIds.length;i+=CHUNK){
      const chunk=pendingRowIds.slice(i,i+CHUNK);
      const idList=chunk.join(',');
      const res=await apiFetch(`gold_recovery?id=in.(${idList})`,'PATCH',{settled_at:nowIso});
      if(!res.ok)throw new Error('計上済みマーク失敗: '+(await res.text()));
    }

    statusEl.textContent=`✅ ${settleRows.length}件を計上確定しました（対象行 ${pendingRowIds.length}件を計上済みにマークしました）。この内容は記録として画面に残ります。`;
    // 二重計上防止のため、入力欄と確定ボタンを無効化（表示はそのまま残す）
    document.querySelectorAll('.adj-input').forEach(el=>{el.disabled=true;});
    btn.disabled=true;
    btn.textContent='計上済み ✓';
    pendingRowIds=[];
  }catch(e){
    statusEl.textContent='❌ エラー: '+e.message;
    btn.disabled=false;
  }finally{
  }
}

async function exportChecklist(){
  const date=document.getElementById('settleDate').value;
  if(!date){alert('計上日を指定してください。');return;}
  if(!aggregated){await loadPending();}
  if(!aggregated||aggregated.stores.length===0){alert('未計上データがありません。');return;}

  const wb=new ExcelJS.Workbook();
  const ws=wb.addWorksheet('未計上チェック表');
  ws.addRow([`地金 〜${date} 未計上分`]);
  const hdr=ws.addRow(['店舗名','金種','未計上g数','当日レート','金額']);
  hdr.eachCell(c=>{c.font={bold:true,color:{argb:'FFFFFFFF'}};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1E2761'}};});

  aggregated.stores.forEach(s=>{
    s.metals.forEach(m=>{
      ws.addRow([s.storeName, m.name, m.qty, m.rate, Math.round(m.qty*m.rate)]);
    });
  });
  ws.getColumn(1).width=28; ws.getColumn(2).width=16; ws.getColumn(3).width=12; ws.getColumn(4).width=12; ws.getColumn(5).width=14;

  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`地金換金_未計上チェック表_${date}.xlsx`; a.click();
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
