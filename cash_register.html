<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金庫〜レジ - ゼロジャパン</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Meiryo','MS Gothic','Yu Gothic',sans-serif;font-size:12px;background:#90ee90;}
.wrap{padding:6px;}
.topbar{display:flex;align-items:center;justify-content:space-between;background:#1E2761;border-radius:8px;padding:8px 14px;margin-bottom:8px;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-size:14px;font-weight:bold;color:#fff;}
.back-btn{padding:5px 14px;background:#fff;color:#1E2761;border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;}
.back-btn:hover{background:#EEF2FF;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.store-name{font-size:12px;font-weight:bold;color:#9FE1CB;}
.date-name{font-size:12px;font-weight:bold;color:#fff;}
.logout-btn{padding:5px 12px;background:#fff;color:#1E2761;border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;}

.main{background:#fff;border-radius:8px;padding:14px;}
.panels{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start;}

/* 左パネル：金庫〜レジ */
.left-panel{min-width:240px;}
.panel-title{font-size:13px;font-weight:bold;color:#1E2761;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid #1E2761;}

table.koko{border-collapse:collapse;width:100%;}
table.koko td{padding:5px 8px;border:1px solid #ddd;white-space:nowrap;}
table.koko td.label{background:#FFB3C1;font-weight:bold;min-width:120px;}
table.koko td.val{background:#fff;text-align:right;min-width:110px;}
table.koko td.val-auto{background:#FFE0E0;text-align:right;min-width:110px;font-weight:bold;}
table.koko td.val-yellow{background:#ffff88;text-align:right;min-width:110px;font-weight:bold;}
table.koko td.val-zero{background:#ffff88;text-align:right;min-width:110px;font-weight:bold;color:#DC2626;}

/* 右パネル：金種表 */
.right-panel{min-width:300px;}
table.kinshuu{border-collapse:collapse;width:100%;}
table.kinshuu th{background:#FFB3C1;padding:5px 10px;text-align:center;border:1px solid #ddd;font-size:11px;}
table.kinshuu td{padding:5px 8px;border:1px solid #ddd;white-space:nowrap;}
table.kinshuu td.denom{background:#d0f0f8;font-weight:bold;text-align:right;min-width:70px;}
table.kinshuu td.cnt{text-align:center;min-width:80px;}
table.kinshuu td.amt{background:#fff;text-align:right;min-width:90px;}
table.kinshuu td.total{background:#ffff88;text-align:right;font-weight:bold;min-width:90px;}
table.kinshuu td.total-label{background:#ffff88;font-weight:bold;text-align:center;}
table.kinshuu td.hq{background:#fff;text-align:right;min-width:90px;}
table.kinshuu td.carry{background:#ffff00;text-align:right;font-weight:bold;min-width:90px;}
table.kinshuu td.carry-label{background:#ffff00;font-weight:bold;text-align:center;}

.inp{width:90px;text-align:right;font-size:11px;border:1px solid #aaa;border-radius:2px;padding:3px 6px;outline:none;background:#fff;}
.inp:focus{border-color:#1E2761;}
.inp-cnt{width:70px;text-align:right;font-size:11px;border:1px solid #aaa;border-radius:2px;padding:3px 4px;outline:none;background:#fff;}
.inp-cnt:focus{border-color:#1E2761;}

.btn-area{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;}
.reg-btn{padding:8px 24px;font-size:13px;font-weight:bold;background:linear-gradient(180deg,#2D4FBA,#1E2761);color:#fff;border:none;border-radius:6px;cursor:pointer;box-shadow:0 4px 0 #0F1640;}
.reg-btn:hover{background:linear-gradient(180deg,#3D6FCA,#2D3E8F);}
.reg-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #0F1640;}
.reg-btn:disabled{background:#94A3B8;box-shadow:none;cursor:not-allowed;}
.clear-btn{padding:8px 16px;font-size:12px;font-weight:bold;background:linear-gradient(180deg,#FF6666,#CC2222);color:#fff;border:none;border-radius:6px;cursor:pointer;box-shadow:0 3px 0 #881111;}

.msg{padding:6px 12px;border-radius:4px;margin-bottom:8px;font-size:11px;display:none;}
.msg.success{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;}
.msg.error{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <div class="topbar-left">
    <button type="button" class="back-btn" onclick="location.href='daily.html'">◀ 日報に戻る</button>
    <div class="topbar-title">🏦 金庫〜レジ</div>
  </div>
  <div class="topbar-right">
    <span class="store-name" id="store-name"></span>
    <span class="date-name" id="date-name"></span>
    <button type="button" class="logout-btn" onclick="handleLogout()">🏠 ログアウト</button>
  </div>
</div>

<div class="msg" id="msg"></div>

<div class="main">
  <div class="panels">

    <!-- 左パネル：金庫〜レジ -->
    <div class="left-panel">
      <div class="panel-title">金庫〜レジ</div>
      <table class="koko">
        <tr>
          <td class="label"></td>
          <td class="val" style="background:#FFB3C1;font-weight:bold;text-align:center;">レジ</td>
        </tr>
        <tr>
          <td class="label">前日繰越</td>
          <td class="val-auto" id="carry-over">0</td>
        </tr>
        <tr>
          <td class="label">本部から入金</td>
          <td class="val"><input type="number" class="inp" id="hq-deposit" value="0" oninput="recalc()"></td>
        </tr>
        <tr>
          <td class="label">店売り（現計）</td>
          <td class="val-auto" id="shop-sales">0</td>
        </tr>
        <tr>
          <td class="label">買取</td>
          <td class="val-auto" id="purchase">0</td>
        </tr>
        <tr>
          <td class="label">出金</td>
          <td class="val"><input type="number" class="inp" id="withdrawal" value="0" oninput="recalc()"></td>
        </tr>
        <tr>
          <td class="label" style="background:#ffff88;">本日有高</td>
          <td class="val-yellow" id="todays-amount">0</td>
        </tr>
        <tr>
          <td class="label">過不足</td>
          <td class="val-zero" id="shortage">0</td>
        </tr>
      </table>
    </div>

    <!-- 右パネル：金種表 -->
    <div class="right-panel">
      <div class="panel-title">レジ内実現金　金種表</div>
      <table class="kinshuu">
        <thead>
          <tr>
            <th>金種</th>
            <th>枚数</th>
            <th>金額</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="denom">¥10,000</td>
            <td class="cnt"><input type="number" class="inp-cnt" id="c10000" value="0" min="0" oninput="recalcKinshuu()"></td>
            <td class="amt" id="a10000">0</td>
          </tr>
          <tr>
            <td class="denom">¥5,000</td>
            <td class="cnt"><input type="number" class="inp-cnt" id="c5000" value="0" min="0" oninput="recalcKinshuu()"></td>
            <td class="amt" id="a5000">0</td>
          </tr>
          <tr>
            <td class="denom">¥1,000</td>
            <td class="cnt"><input type="number" class="inp-cnt" id="c1000" value="0" min="0" oninput="recalcKinshuu()"></td>
            <td class="amt" id="a1000">0</td>
          </tr>
          <tr>
            <td class="denom">¥500</td>
            <td class="cnt"><input type="number" class="inp-cnt" id="c500" value="0" min="0" oninput="recalcKinshuu()"></td>
            <td class="amt" id="a500">0</td>
          </tr>
          <tr>
            <td class="denom">¥100</td>
            <td class="cnt"><input type="number" class="inp-cnt" id="c100" value="0" min="0" oninput="recalcKinshuu()"></td>
            <td class="amt" id="a100">0</td>
          </tr>
          <tr>
            <td class="denom">¥50</td>
            <td class="cnt"><input type="number" class="inp-cnt" id="c50" value="0" min="0" oninput="recalcKinshuu()"></td>
            <td class="amt" id="a50">0</td>
          </tr>
          <tr>
            <td class="denom">¥10</td>
            <td class="cnt"><input type="number" class="inp-cnt" id="c10" value="0" min="0" oninput="recalcKinshuu()"></td>
            <td class="amt" id="a10">0</td>
          </tr>
          <tr>
            <td class="denom">¥5</td>
            <td class="cnt"><input type="number" class="inp-cnt" id="c5" value="0" min="0" oninput="recalcKinshuu()"></td>
            <td class="amt" id="a5">0</td>
          </tr>
          <tr>
            <td class="denom">¥1</td>
            <td class="cnt"><input type="number" class="inp-cnt" id="c1" value="0" min="0" oninput="recalcKinshuu()"></td>
            <td class="amt" id="a1">0</td>
          </tr>
          <tr>
            <td class="total-label" colspan="2">レジ内実現金</td>
            <td class="total" id="register-cash">0</td>
          </tr>
          <tr>
            <td class="label" style="background:#FFB3C1;">本部入金</td>
            <td class="cnt"><input type="number" class="inp-cnt" id="hq-payment" value="0" min="0" oninput="recalcKinshuu()"></td>
            <td class="hq" id="hq-payment-amt">0</td>
          </tr>
          <tr>
            <td class="carry-label" colspan="2">レジ内繰越</td>
            <td class="carry" id="register-carry">0</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <div class="btn-area">
    <button type="button" class="clear-btn" onclick="handleClear()">クリア</button>
    <button type="button" class="reg-btn" id="reg-btn" onclick="handleSave()">📝 登録</button>
  </div>
</div>

</div>

<script>
const SUPABASE_URL='https://fvkssslpmjtykxoulfmf.supabase.co';
const SUPABASE_KEY='sb_publishable_cE7_r5efkdwSM7YM_8qZmw_6Cxrwfpk';

async function apiFetch(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}};
  if(body){opts.headers['Content-Type']='application/json';opts.headers['Prefer']='return=minimal';opts.body=JSON.stringify(body);}
  return await fetch(SUPABASE_URL+'/rest/v1/'+path,opts);
}

function showMsg(text,type='success'){
  const el=document.getElementById('msg');
  el.textContent=text;el.className='msg '+type;el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

function fmt(n){return Math.round(n||0).toLocaleString('ja-JP');}
function numV(id){return parseInt(document.getElementById(id)?.value||0)||0;}

const params=new URLSearchParams(location.search);
const reportDate=params.get('date')||new Date().toISOString().slice(0,10);
const storeId=params.get('store')||'';
const storeName=localStorage.getItem('store')||'';

let carryOver=0;
let shopSales=0;
let purchaseAmt=0;

// 金種
const DENOMS=[
  {id:'10000',val:10000},{id:'5000',val:5000},{id:'1000',val:1000},
  {id:'500',val:500},{id:'100',val:100},{id:'50',val:50},
  {id:'10',val:10},{id:'5',val:5},{id:'1',val:1}
];

// 金種計算
function recalcKinshuu(){
  let total=0;
  DENOMS.forEach(d=>{
    const cnt=numV('c'+d.id);
    const amt=cnt*d.val;
    document.getElementById('a'+d.id).textContent=fmt(amt);
    total+=amt;
  });
  document.getElementById('register-cash').textContent=fmt(total);
  const hqPay=numV('hq-payment');
  document.getElementById('hq-payment-amt').textContent=fmt(hqPay);
  const regCarry=total-hqPay;
  document.getElementById('register-carry').textContent=fmt(regCarry);
  recalc();
}

// 左パネル計算
function recalc(){
  const hqDep=numV('hq-deposit');
  const withdrawal=numV('withdrawal');
  const todaysAmt=carryOver+hqDep+shopSales-purchaseAmt-withdrawal;
  document.getElementById('todays-amount').textContent=fmt(todaysAmt);

  // 過不足 = 本日有高 - レジ内実現金
  const regCash=parseInt(document.getElementById('register-cash').textContent.replace(/,/g,'')||0);
  const shortage=todaysAmt-regCash;
  const shortageEl=document.getElementById('shortage');
  shortageEl.textContent=fmt(shortage);
  shortageEl.style.color=shortage===0?'#065F46':shortage>0?'#1E2761':'#DC2626';
}

// 前日繰越を取得
async function loadCarryOver(){
  const res=await apiFetch(`cash_register?store_id=eq.${storeId}&record_date=lt.${reportDate}&order=record_date.desc&limit=1&select=register_carry`);
  const data=await res.json()||[];
  if(data.length>0){
    carryOver=data[0].register_carry||0;
  }
  document.getElementById('carry-over').textContent=fmt(carryOver);
}

// 日報から店売り（現計）と買取を取得
async function loadDailyData(){
  const res=await apiFetch(`daily_reports?report_date=eq.${reportDate}&store_id=eq.${storeId}&select=channel_id,amount`);
  const data=await res.json()||[];

  // 店売り現計 = channel_id=3（店売り）の合計
  shopSales=data.filter(r=>r.channel_id===3).reduce((s,r)=>s+(r.amount||0),0);
  // 買取 = channel_id=1（買取）の合計
  purchaseAmt=data.filter(r=>r.channel_id===1).reduce((s,r)=>s+(r.amount||0),0);

  document.getElementById('shop-sales').textContent=fmt(shopSales);
  document.getElementById('purchase').textContent=fmt(purchaseAmt);
}

// 既存データ読み込み
async function loadTodayData(){
  const res=await apiFetch(`cash_register?store_id=eq.${storeId}&record_date=eq.${reportDate}&select=*`);
  const data=await res.json()||[];
  if(data.length===0)return;
  const d=data[0];

  document.getElementById('hq-deposit').value=d.hq_deposit||0;
  document.getElementById('withdrawal').value=d.withdrawal||0;
  document.getElementById('hq-payment').value=d.hq_payment||0;

  DENOMS.forEach(dn=>{
    const el=document.getElementById('c'+dn.id);
    if(el)el.value=d['count_'+dn.id]||0;
  });
  recalcKinshuu();
}

async function handleSave(){
  const btn=document.getElementById('reg-btn');
  btn.disabled=true;btn.textContent='登録中...';

  const hqDep=numV('hq-deposit');
  const withdrawal=numV('withdrawal');
  const todaysAmt=carryOver+hqDep+shopSales-purchaseAmt-withdrawal;
  const regCash=parseInt(document.getElementById('register-cash').textContent.replace(/,/g,'')||0);
  const shortage=todaysAmt-regCash;
  const hqPay=numV('hq-payment');
  const regCarry=regCash-hqPay;

  const record={
    store_id:parseInt(storeId),
    record_date:reportDate,
    carry_over:carryOver,
    hq_deposit:hqDep,
    shop_sales:shopSales,
    purchase:purchaseAmt,
    withdrawal:withdrawal,
    todays_amount:todaysAmt,
    shortage:shortage,
    count_10000:numV('c10000'),
    count_5000:numV('c5000'),
    count_1000:numV('c1000'),
    count_500:numV('c500'),
    count_100:numV('c100'),
    count_50:numV('c50'),
    count_10:numV('c10'),
    count_5:numV('c5'),
    count_1:numV('c1'),
    register_cash:regCash,
    hq_payment:hqPay,
    register_carry:regCarry,
  };

  try{
    await apiFetch(`cash_register?store_id=eq.${storeId}&record_date=eq.${reportDate}`,'DELETE');
    const res=await apiFetch('cash_register','POST',record);
    if(!res.ok){const err=await res.text();showMsg('登録エラー：'+err,'error');btn.disabled=false;btn.textContent='📝 登録';return;}
    btn.textContent='登録済み ✓';
    showMsg('✅ 登録しました。','success');
    setTimeout(()=>{btn.disabled=false;btn.textContent='📝 登録';},3000);
  }catch(e){
    showMsg('通信エラー：'+e.message,'error');
    btn.disabled=false;btn.textContent='📝 登録';
  }
}

function handleClear(){
  if(!confirm('入力内容をクリアしますか？'))return;
  document.getElementById('hq-deposit').value=0;
  document.getElementById('withdrawal').value=0;
  document.getElementById('hq-payment').value=0;
  DENOMS.forEach(d=>{const el=document.getElementById('c'+d.id);if(el)el.value=0;});
  recalcKinshuu();
}

function handleLogout(){
  if(confirm('ログアウトしますか？')){localStorage.clear();window.location.href='login.html';}
}

async function init(){
  document.getElementById('store-name').textContent=storeName;
  document.getElementById('date-name').textContent=reportDate;
  await Promise.all([loadCarryOver(),loadDailyData()]);
  await loadTodayData();
  recalcKinshuu();
}

init();
</script>
</body>
</html>
